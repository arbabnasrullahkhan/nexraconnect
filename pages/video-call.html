<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Live Call & PK - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ULTRA PREMIUM TIKTOK LIVE / PK VARIABLES ===== */
        :root {
            --bg-dark: #000000;
            --surface: rgba(20, 20, 25, 0.65);
            --surface-light: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --text-muted: #EBEBF5;
            --accent: #FF2E93;
            --premium: #FFD60A;
            --pk-blue: #00F0FF;
            --pk-red: #FF0050;
            --success: #32D74B;
            --danger: #FF453A;
            --blur: blur(25px);
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Prevent all browser zooming and over-scrolling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: pan-y; }
        html, body { background-color: var(--bg-dark); color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; position: relative; overscroll-behavior: none; }

        /* ===== VIDEO GRID (DYNAMIC SOLO & PK MODE) ===== */
        .video-wrapper { position: absolute; inset: 0; z-index: 0; background: #050505; display: flex; transition: all 0.5s ease; }
        
        /* Solo Mode */
        .video-wrapper.solo { display: block; }
        .video-wrapper.solo .remote-slot { width: 100%; height: 100%; position: absolute; inset: 0; }
        .video-wrapper.solo .local-pip { position: absolute; top: calc(var(--safe-top) + 90px); right: 16px; width: 100px; height: 150px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 10; overflow: hidden; transition: 0.3s; }
        
        /* PK / Live Match Mode (Split Screen) */
        .video-wrapper.pk-mode { flex-direction: row; align-items: center; justify-content: center; padding-top: 100px; padding-bottom: 200px; gap: 4px; }
        .video-wrapper.pk-mode .local-pip, .video-wrapper.pk-mode .remote-slot { position: relative; top: 0; right: 0; width: 50%; height: 50vh; border-radius: 20px; border: none; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .video-wrapper.pk-mode .local-pip { border: 2px solid var(--pk-blue); }
        .video-wrapper.pk-mode .remote-slot { border: 2px solid var(--pk-red); }

        #remoteVideo, #localVideo { width: 100%; height: 100%; object-fit: cover; object-position: center; filter: brightness(1.05); }
        #localVideo { transform: scaleX(-1); } /* Mirror local */

        /* ===== DYNAMIC ISLAND & DROPDOWN (TOP HEADER) ===== */
        .island-container { position: absolute; top: var(--safe-top); left: 16px; right: 16px; z-index: 50; display: flex; flex-direction: column; align-items: center; }
        .dynamic-island { background: rgba(0,0,0,0.65); backdrop-filter: var(--blur); border-radius: 30px; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; transition: 0.3s; }
        .dynamic-island:active { transform: scale(0.98); }
        
        .island-left { display: flex; align-items: center; gap: 8px; }
        .island-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .island-info { display: flex; flex-direction: column; }
        .island-name { font-size: 0.9rem; font-weight: 800; display: flex; align-items: center; gap: 4px; }
        .verified-badge { width: 14px; height: 14px; fill: var(--accent); }
        .island-sub { font-size: 0.65rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        
        .island-right { display: flex; align-items: center; gap: 10px; }
        .live-badge { background: var(--danger); color: #fff; font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 10px; animation: pulseLive 1.5s infinite; letter-spacing: 0.5px; }
        .icon-down { width: 18px; stroke: #fff; fill: none; stroke-width: 2.5; transition: transform 0.3s; }

        @keyframes pulseLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Dropdown Menu (Under Island) */
        .island-dropdown { width: 100%; max-width: 500px; background: rgba(20,20,25,0.85); backdrop-filter: var(--blur); border-radius: 24px; border: 1px solid var(--glass-border); margin-top: 10px; overflow: hidden; max-height: 0; opacity: 0; transition: all 0.4s var(--spring); }
        .island-dropdown.open { max-height: 300px; opacity: 1; padding: 10px 0; }
        .dropdown-item { padding: 14px 20px; display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .dropdown-item:active { background: rgba(255,255,255,0.1); }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item svg { width: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .item-danger { color: var(--danger); }

        /* ===== PK BAR (TikTok Style) ===== */
        .pk-bar-container { width: 100%; max-width: 500px; height: 16px; background: var(--pk-blue); border-radius: 10px; margin-top: 10px; overflow: hidden; position: relative; border: 2px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: none; }
        .pk-bar-red { position: absolute; top: 0; right: 0; height: 100%; width: 50%; background: var(--pk-red); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .pk-score { position: absolute; top: 0; z-index: 2; font-size: 0.7rem; font-weight: 900; line-height: 12px; padding: 0 6px; text-shadow: 0 1px 3px #000; }
        .pk-score.left { left: 0; } .pk-score.right { right: 0; }
        .pk-timer { position: absolute; left: 50%; transform: translateX(-50%); background: #000; color: #fff; font-size: 0.65rem; font-weight: 900; padding: 2px 8px; border-radius: 8px; z-index: 3; top: -1px; }

        /* ===== TIKTOK STYLE ALWAYS-ON CHAT ===== */
        .chat-layer { position: absolute; bottom: calc(var(--safe-bottom) + 90px); left: 16px; width: 70%; max-width: 320px; height: 35vh; display: flex; flex-direction: column; justify-content: flex-end; gap: 6px; z-index: 30; pointer-events: none; overflow: hidden; mask-image: linear-gradient(to top, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to top, black 80%, transparent 100%); }
        
        .chat-bubble { background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; line-height: 1.3; color: #fff; width: fit-content; word-wrap: break-word; animation: slideInChat 0.4s var(--spring); transition: opacity 0.5s ease; pointer-events: auto; }
        .chat-name { font-size: 0.75rem; font-weight: 800; color: var(--premium); margin-bottom: 2px; opacity: 0.9; }
        .chat-local .chat-name { color: var(--pk-blue); }
        
        @keyframes slideInChat { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Chat Input */
        .chat-input-wrapper { position: absolute; bottom: calc(var(--safe-bottom) + 90px); right: 16px; z-index: 40; }
        .chat-input-panel { background: rgba(0,0,0,0.6); backdrop-filter: var(--blur); padding: 6px; border-radius: 30px; display: flex; gap: 8px; align-items: center; border: 1px solid var(--glass-border); width: 250px; opacity: 0; visibility: hidden; transform: translateX(20px); transition: 0.3s var(--spring); }
        .chat-input-panel.show { opacity: 1; visibility: visible; transform: translateX(0); }
        .chat-input-panel input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px 12px; font-size: 0.9rem; outline: none; font-weight: 500; }
        .send-btn { background: var(--accent); color: #fff; border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Chat Toggle Icon */
        .quick-chat-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; position: absolute; right: 0; bottom: 0; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .quick-chat-icon:active { transform: scale(0.9); }

        /* ===== FLOATING GIFT ICON ===== */
        .floating-gift-btn { position: absolute; bottom: calc(var(--safe-bottom) + 145px); right: 16px; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #FF2E93, #FF8A00); border: 2px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 46, 147, 0.5); z-index: 40; transition: 0.2s; animation: floatGift 3s infinite ease-in-out; }
        .floating-gift-btn:active { transform: scale(0.9); }
        .floating-gift-btn svg { width: 24px; stroke: #fff; fill: none; stroke-width: 2; }
        @keyframes floatGift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ===== BOTTOM DOCK (ONLY 4 BUTTONS) ===== */
        .bottom-dock { position: absolute; bottom: var(--safe-bottom); left: 50%; transform: translateX(-50%); display: flex; gap: 12px; padding: 12px 20px; background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-radius: 40px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 100; align-items: center; width: max-content; }
        
        .dock-btn { width: 54px; height: 54px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s var(--spring); }
        .dock-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .dock-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.25); }
        .dock-btn.off { background: #fff; color: #000; }
        
        /* Skip Button Prominent */
        .btn-skip { background: #fff; color: #000; font-weight: 900; font-size: 1.1rem; padding: 0 32px; border-radius: 30px; height: 54px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(255,255,255,0.2); border: none; cursor: pointer; transition: 0.2s; }
        .btn-skip:active { transform: scale(0.95); }
        .btn-skip svg { width: 20px; stroke: #000; fill: none; stroke-width: 3; }

        /* ===== PREMIUM GIFT STORE MODAL ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: 0.4s var(--spring); }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .bottom-sheet { width: 100%; max-width: 500px; background: #141416; border-radius: 32px 32px 0 0; padding: 24px 24px var(--safe-bottom); transform: translateY(100%); transition: 0.5s var(--spring); max-height: 85vh; display: flex; flex-direction: column; border-top: 1px solid var(--glass-border); }
        .modal-overlay.open .bottom-sheet { transform: translateY(0); }
        .modal-drag { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin: 0 auto 20px; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.2rem; font-weight: 800; color: #fff; }
        
        .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; overflow-y: auto; padding-bottom: 20px; }
        .gift-grid::-webkit-scrollbar { display: none; }
        .gift-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .gift-item:active { transform: scale(0.9); border-color: var(--premium); background: rgba(255, 214, 10, 0.1); }
        .gift-emoji { font-size: 2.5rem; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .gift-name { font-size: 0.7rem; font-weight: 800; color: #fff; }
        .gift-price { font-size: 0.65rem; font-weight: 700; color: var(--premium); display: flex; align-items: center; gap: 2px; }

        /* ===== TIKTOK STYLE 3D GIFT ANIMATIONS ===== */
        .gift-anim-layer { position: fixed; inset: 0; z-index: 150; pointer-events: none; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .flying-gift { position: absolute; font-size: 10rem; opacity: 0; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); }
        /* Complex 3D trajectory */
        @keyframes flyGift {
            0% { transform: translateY(100vh) scale(0) rotate(-20deg); opacity: 0; }
            20% { transform: translateY(10vh) scale(1.5) rotate(10deg); opacity: 1; }
            80% { transform: translateY(-10vh) scale(1.5) rotate(-10deg); opacity: 1; }
            100% { transform: translateY(-100vh) scale(3) rotate(20deg); opacity: 0; }
        }

        /* Responsive Tweaks */
        @media(max-width: 400px) {
            .controls-dock { padding: 10px; gap: 8px; width: 96%; }
            .dock-btn { width: 48px; height: 48px; }
            .btn-skip { height: 48px; padding: 0 20px; font-size: 1rem; }
            .chat-layer { bottom: calc(var(--safe-bottom) + 80px); width: 85%; }
            .chat-input-wrapper { bottom: calc(var(--safe-bottom) + 80px); }
            .floating-gift-btn { bottom: calc(var(--safe-bottom) + 130px); }
        }
    </style>
</head>
<body>

    <!-- 1. VIDEO GRID (SOLO / PK MODE) -->
    <div class="video-wrapper solo" id="videoGrid">
        <div class="remote-slot">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="local-pip" id="localVideoContainer">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <!-- 2. ISLAND HEADER & DROPDOWN MENU -->
    <div class="island-container">
        <!-- Island Bar -->
        <div class="dynamic-island" id="islandToggle">
            <div class="island-left">
                <img src="" class="island-avatar" id="peerPic" alt="" onerror="this.src='https://i.pravatar.cc/150?u=guest'">
                <div class="island-info">
                    <div class="island-name">
                        <span id="peerName">Connecting...</span>
                        <svg class="verified-badge" id="badgeVerified" style="display:none;" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="island-sub">
                        <span id="peerCountry">🌍 Global</span> • <span id="callTimer">00:00</span>
                    </div>
                </div>
            </div>
            <div class="island-right">
                <div class="live-badge" id="liveBadge" style="display: none;">LIVE</div>
                <svg class="icon-down" id="islandIcon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
        </div>

        <!-- PK Battle Bar (Hidden by default) -->
        <div class="pk-bar-container" id="pkBar">
            <div class="pk-timer">PK 03:00</div>
            <div class="pk-score left" id="pkScoreBlue">0</div>
            <div class="pk-score right" id="pkScoreRed">0</div>
            <div class="pk-bar-red" id="pkRedFill"></div>
        </div>

        <!-- Dropdown Options -->
        <div class="island-dropdown" id="islandMenu">
            <div class="dropdown-item" id="addFriendBtn">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                Add Friend
            </div>
            <div class="dropdown-item" id="recordBtn">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
                Record Screen (Local)
            </div>
            <div class="dropdown-item" onclick="switchCamera()">
                <svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                Flip Camera (F)
            </div>
            <div class="dropdown-item item-danger" id="endBtn">
                <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
                End Call (E)
            </div>
        </div>
    </div>

    <!-- 3. ALWAYS-ON TRANSPARENT CHAT -->
    <div class="chat-layer" id="chatLayer"></div>

    <!-- Quick Chat Input -->
    <div class="chat-input-wrapper">
        <div class="chat-input-panel" id="chatPanel">
            <input type="text" id="chatInput" placeholder="Send a message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">
                <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
        <div class="quick-chat-icon" id="toggleChatBtn" title="Chat (C)">
            <svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
    </div>

    <!-- 4. FLOATING GIFT ICON -->
    <div class="floating-gift-btn" onclick="openModal('giftModal')" title="Send Gift (G)">
        <svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
    </div>

    <!-- 5. 3D GIFT ANIMATION LAYER -->
    <div class="gift-anim-layer" id="giftAnimLayer"></div>

    <!-- 6. BOTTOM DOCK (ONLY 4 BUTTONS) -->
    <div class="bottom-dock">
        <button class="dock-btn" id="toggleAudio" title="Mute Mic (M)">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        
        <button class="dock-btn" id="toggleVideo" title="Disable Camera (V)">
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>

        <button class="dock-btn" onclick="openModal('moreModal')" title="More Options">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/></svg>
        </button>

        <button class="btn-skip" id="skipBtn" title="Instant Skip (S)">
            Skip
            <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
    </div>

    <!-- 7. MORE MENU (3-DOT BOTTOM SHEET) -->
    <div class="modal-overlay" id="moreModal" onclick="if(event.target===this) closeModals()">
        <div class="bottom-sheet">
            <div class="modal-drag"></div>
            <div class="modal-header"><div class="modal-title">Advanced Controls</div></div>
            
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
                <div class="dropdown-item" style="flex-direction: column; padding:0; border:none; text-align:center;" onclick="togglePKMode()">
                    <div style="width:50px; height:50px; background:rgba(255,255,255,0.1); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; color:#fff;">
                        <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    </div>
                    <span style="font-size:0.7rem; color:var(--text-muted);">PK / Live</span>
                </div>
                <div class="dropdown-item" style="flex-direction: column; padding:0; border:none; text-align:center;" id="screenShareBtn">
                    <div style="width:50px; height:50px; background:rgba(255,255,255,0.1); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; color:#fff;">
                        <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </div>
                    <span style="font-size:0.7rem; color:var(--text-muted);">Share</span>
                </div>
                <div class="dropdown-item" style="flex-direction: column; padding:0; border:none; text-align:center;" onclick="applyFilter('contrast(1.2) saturate(1.2) blur(1px)')">
                    <div style="width:50px; height:50px; background:rgba(255,255,255,0.1); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; color:#fff;">
                        <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    </div>
                    <span style="font-size:0.7rem; color:var(--text-muted);">Beauty</span>
                </div>
                <div class="dropdown-item item-danger" style="flex-direction: column; padding:0; border:none; text-align:center;" onclick="alert('User Reported. Processing skip.'); document.getElementById('skipBtn').click();">
                    <div style="width:50px; height:50px; background:rgba(255, 69, 58, 0.15); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; color:var(--danger); border:1px solid rgba(255,69,58,0.3);">
                        <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    </div>
                    <span style="font-size:0.7rem;">Report</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 8. PREMIUM GIFT STORE MODAL -->
    <div class="modal-overlay" id="giftModal" onclick="if(event.target===this) closeModals()">
        <div class="bottom-sheet">
            <div class="modal-drag"></div>
            <div class="modal-header">
                <div class="modal-title">Premium Store</div>
                <div style="font-size: 0.8rem; font-weight: 800; color: var(--premium); background:rgba(255,214,10,0.1); padding:4px 10px; border-radius:10px;">Balance: $0.00</div>
            </div>
            
            <div class="gift-grid">
                <div class="gift-item" onclick="sendPremiumGift('🌹', 1.00)">
                    <div class="gift-emoji">🌹</div><div class="gift-name">Rose</div><div class="gift-price">$1.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('🍩', 2.00)">
                    <div class="gift-emoji">🍩</div><div class="gift-name">Donut</div><div class="gift-price">$2.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('💎', 5.00)">
                    <div class="gift-emoji">💎</div><div class="gift-name">Diamond</div><div class="gift-price">$5.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('👑', 10.00)">
                    <div class="gift-emoji">👑</div><div class="gift-name">Crown</div><div class="gift-price">$10.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('🚀', 25.00)">
                    <div class="gift-emoji">🚀</div><div class="gift-name">Rocket</div><div class="gift-price">$25.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('🦁', 50.00)">
                    <div class="gift-emoji">🦁</div><div class="gift-name">Lion</div><div class="gift-price">$50.00</div>
                </div>
                <div class="gift-item" onclick="sendPremiumGift('🌌', 100.00)">
                    <div class="gift-emoji">🌌</div><div class="gift-name">Universe</div><div class="gift-price">$100.00</div>
                </div>
            </div>
        </div>
    </div>


    <!-- 9. LOGIC & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, get, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        let peerConnection, localStream, remoteStream, currentUser;
        let peerUid = null;
        let callTimerInterval = null;
        let callSeconds = 0;
        let facingMode = 'user';
        let mediaRecorder = null;
        let recordedChunks = [];
        let isUserPro = false;

        // PK Mode Score Simulation
        let pkBlue = 0, pkRed = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const isCaller = urlParams.get('caller') === 'true';
        const matchMode = urlParams.get('mode') || 'random';

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');

        if (!roomId) window.location.href = 'home.html';

        // --- UI TOGGLES & MODALS ---
        window.openModal = (id) => { vibrate(); document.getElementById(id).classList.add('open'); };
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
        
        document.getElementById('islandToggle').addEventListener('click', () => {
            vibrate();
            const menu = document.getElementById('islandMenu');
            const icon = document.getElementById('islandIcon');
            menu.classList.toggle('open');
            icon.style.transform = menu.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if(document.activeElement.id === 'chatInput') {
                if(e.key === 'Escape') document.activeElement.blur();
                return;
            }
            switch(e.key.toLowerCase()) {
                case 'm': document.getElementById('toggleAudio').click(); break;
                case 'v': document.getElementById('toggleVideo').click(); break;
                case 's': case ' ': e.preventDefault(); document.getElementById('skipBtn').click(); break;
                case 'e': document.getElementById('endBtn').click(); break;
                case 'g': openModal('giftModal'); break;
                case 'c': document.getElementById('toggleChatBtn').click(); break;
                case 'f': switchCamera(); break;
                case 'escape': closeModals(); document.getElementById('islandMenu').classList.remove('open'); break;
            }
        });

        // --- AUTH & INIT WEBRTC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(ref(db, 'users/' + user.uid));
                isUserPro = snap.val().isPremium || false;
                initCall();
            } else {
                window.location.href = '../index.html';
            }
        });

        async function initCall() {
            try {
                // 100% NOISE CANCELLATION & HD CONSTRAINTS
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: facingMode },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000 }
                });
                localVideo.srcObject = localStream;
            } catch (err) {
                alert("Camera & Mic required.");
                window.location.href = 'home.html';
                return;
            }

            peerConnection = new RTCPeerConnection(configuration);
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                startCallTimer();
                fetchPeerProfile();
            };

            const callerCandidatesRef = ref(db, `rooms/${roomId}/callerCandidates`);
            const calleeCandidatesRef = ref(db, `rooms/${roomId}/calleeCandidates`);

            peerConnection.onicecandidate = event => {
                if (event.candidate) push(isCaller ? callerCandidatesRef : calleeCandidatesRef, event.candidate.toJSON());
            };

            if (isCaller) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await set(ref(db, `rooms/${roomId}/offer`), { type: offer.type, sdp: offer.sdp });

                onValue(ref(db, `rooms/${roomId}/answer`), snapshot => {
                    const answer = snapshot.val();
                    if (!peerConnection.currentRemoteDescription && answer) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    }
                });
                onChildAdded(calleeCandidatesRef, snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));
                
                const s = await get(ref(db, 'users/' + currentUser.uid + '/matchedWith/targetUid'));
                if (s.exists()) peerUid = s.val();

            } else {
                onValue(ref(db, `rooms/${roomId}/offer`), async snapshot => {
                    const offer = snapshot.val();
                    if (offer && !peerConnection.currentRemoteDescription) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        await set(ref(db, `rooms/${roomId}/answer`), { type: answer.type, sdp: answer.sdp });
                    }
                });
                onChildAdded(callerCandidatesRef, snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));
                
                onValue(ref(db, `rooms/${roomId}/callerUid`), s => { if (s.val()) peerUid = s.val(); });
                // We are receiver, so caller is setting their UID. We fetch it when ready.
                setTimeout(async () => {
                    if(!peerUid) {
                        const s = await get(ref(db, 'users/' + currentUser.uid + '/matchedWith/targetUid'));
                        if (s.exists()) peerUid = s.val();
                    }
                }, 1000);
            }

            // Hangup listener
            onValue(ref(db, `rooms/${roomId}/hangup`), snapshot => {
                if (snapshot.val() === true) {
                    cleanupLocally();
                    window.location.href = `match.html?mode=${matchMode}`;
                }
            });

            setupChatAndGifts();
        }

        // --- FETCH SYNCED PROFILE ---
        async function fetchPeerProfile() {
            if(!peerUid) return;
            const snap = await get(ref(db, 'users/' + peerUid));
            if(!snap.exists()) return;
            const p = snap.val();
            
            document.getElementById('peerName').textContent = p.displayName || 'Guest User';
            if(p.photoURL) document.getElementById('peerPic').src = p.photoURL;
            document.getElementById('peerCountry').textContent = p.country || 'Global';
            
            if(p.isVerified) document.getElementById('badgeVerified').style.display = 'block';
        }

        function startCallTimer() {
            if(callTimerInterval) return;
            callTimerInterval = setInterval(() => {
                callSeconds++;
                const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
                const s = String(callSeconds % 60).padStart(2, '0');
                document.getElementById('callTimer').textContent = `${m}:${s}`;
            }, 1000);
        }

        // --- HARDWARE TOGGLES ---
        window.vibrate = () => { if (navigator.vibrate) navigator.vibrate(10); };

        window.switchCamera = async () => {
            vibrate(); document.getElementById('islandMenu').classList.remove('open');
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            document.getElementById('localVideo').style.transform = facingMode === 'user' ? 'scaleX(-1) scale(1.05)' : 'scale(1.05)';
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: facingMode },
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            localVideo.srcObject = localStream;
            const videoTrack = localStream.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            if (sender) sender.replaceTrack(videoTrack);
        };

        let isMuted = false, isVideoOff = false;
        document.getElementById('toggleAudio').addEventListener('click', (e) => {
            vibrate(); isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            e.currentTarget.classList.toggle('off', isMuted);
            e.currentTarget.innerHTML = isMuted 
                ? `<svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/></svg>`
                : `<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
        });

        document.getElementById('toggleVideo').addEventListener('click', (e) => {
            vibrate(); isVideoOff = !isVideoOff;
            localStream.getVideoTracks()[0].enabled = !isVideoOff;
            e.currentTarget.classList.toggle('off', isVideoOff);
        });

        // --- ALWAYS-ON CHAT & 3D GIFTS ---
        let chatMessagesArr = [];
        const chatLayer = document.getElementById('chatLayer');

        function setupChatAndGifts() {
            const messagesRef = ref(db, `rooms/${roomId}/messages`);
            onChildAdded(messagesRef, async snapshot => {
                const msg = snapshot.val();
                
                if (msg.type === 'gift') {
                    play3DGiftAnimation(msg.text);
                    if(document.getElementById('pkBar').style.display === 'block') {
                        // Update PK Score
                        if(msg.uid === currentUser.uid) pkBlue += msg.value; else pkRed += msg.value;
                        updatePKBar();
                    }
                    return;
                }

                // Standard Chat
                const div = document.createElement('div');
                div.className = `chat-bubble ${msg.uid === currentUser.uid ? 'chat-local' : 'chat-remote'}`;
                
                // Fetch name for chat
                let senderName = msg.uid === currentUser.uid ? 'Me' : (document.getElementById('peerName').textContent || 'Guest');
                div.innerHTML = `<div class="chat-name">${senderName}</div>${msg.text}`;
                
                chatLayer.appendChild(div);
                chatMessagesArr.push(div);
                updateChatFading();

                // Fading Logic
                setTimeout(() => {
                    div.style.opacity = '0';
                    div.style.transform = 'translateY(-10px) scale(0.9)';
                    setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); chatMessagesArr = chatMessagesArr.filter(d => d !== div); updateChatFading(); }, 500);
                }, 5000);
            });

            const send = async () => {
                const input = document.getElementById('chatInput');
                if (input.value.trim() && currentUser) {
                    await push(messagesRef, { type: 'text', uid: currentUser.uid, text: input.value.trim(), ts: Date.now() });
                    input.value = '';
                    document.getElementById('chatPanel').classList.remove('show');
                }
            };
            document.getElementById('sendBtn').addEventListener('click', send);
            document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key==='Enter') send(); });
        }

        function updateChatFading() {
            const total = chatMessagesArr.length;
            chatMessagesArr.forEach((node, idx) => {
                const pos = total - idx;
                if(pos === 1) node.style.opacity = '1';
                else if(pos === 2) node.style.opacity = '0.7';
                else if(pos === 3) node.style.opacity = '0.4';
                else node.style.display = 'none';
            });
        }

        document.getElementById('toggleChatBtn').addEventListener('click', () => {
            vibrate();
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('show');
            if(panel.classList.contains('show')) document.getElementById('chatInput').focus();
        });

        // TikTok Style Gifts
        window.sendPremiumGift = async (emoji, price) => {
            vibrate();
            // In a real app, verify wallet balance here.
            // If empty -> window.location.href = 'subscription.html'; return;
            
            closeModals();
            await push(ref(db, `rooms/${roomId}/messages`), { type: 'gift', uid: currentUser.uid, text: emoji, value: price, ts: Date.now() });
        };

        function play3DGiftAnimation(emoji) {
            const layer = document.getElementById('giftAnimLayer');
            const el = document.createElement('div');
            el.className = 'flying-gift';
            el.textContent = emoji;
            // Randomize trajectory slightly
            const isLeft = Math.random() > 0.5 ? 1 : -1;
            el.style.animation = `flyGift 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
            layer.appendChild(el);
            setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 3000);
        }

        // --- PK MODE LOGIC ---
        window.togglePKMode = () => {
            vibrate(); closeModals();
            const wrapper = document.getElementById('videoGrid');
            const pkBar = document.getElementById('pkBar');
            const badge = document.getElementById('liveBadge');

            if(wrapper.classList.contains('solo')) {
                wrapper.classList.remove('solo');
                wrapper.classList.add('pk-mode');
                pkBar.style.display = 'block';
                badge.style.display = 'block';
            } else {
                wrapper.classList.add('solo');
                wrapper.classList.remove('pk-mode');
                pkBar.style.display = 'none';
                badge.style.display = 'none';
            }
        };

        function updatePKBar() {
            const total = pkBlue + pkRed;
            const bluePct = total === 0 ? 50 : (pkBlue / total) * 100;
            document.getElementById('pkRedFill').style.width = `${100 - bluePct}%`;
            document.getElementById('pkScoreBlue').textContent = pkBlue;
            document.getElementById('pkScoreRed').textContent = pkRed;
        }

        // --- ADVANCED FEATURES ---
        // Add Friend
        document.getElementById('addFriendBtn').addEventListener('click', async () => {
            vibrate(); document.getElementById('islandMenu').classList.remove('open');
            if (!peerUid) return;
            await set(ref(db, `users/${peerUid}/friendRequests/${currentUser.uid}`), { timestamp: Date.now(), status: 'pending' });
            alert("Friend request sent securely.");
        });

        // Screen Record (Local Storage)
        document.getElementById('recordBtn').addEventListener('click', async () => {
            vibrate(); document.getElementById('islandMenu').classList.remove('open');
            try {
                const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(displayStream, { mimeType: 'video/webm' });
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Nexra_Call_${Date.now()}.webm`;
                    a.click();
                    recordedChunks = [];
                    alert('HD Recording saved to your device.');
                };
                mediaRecorder.start();
                alert('Recording Started. Ends automatically when you stop sharing.');
            } catch (err) { alert('Screen recording permission denied.'); }
        });

        // Screen Share
        document.getElementById('screenShareBtn').addEventListener('click', async () => {
            vibrate(); closeModals();
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
                
                videoTrack.onended = () => {
                    const camTrack = localStream.getVideoTracks()[0];
                    if (sender) sender.replaceTrack(camTrack);
                };
            } catch (err) {}
        });

        // CSS Filters
        window.applyFilter = (filterCSS) => {
            vibrate(); closeModals();
            localVideo.style.filter = filterCSS;
        };

        // --- INSTANT SKIP & END ---
        document.getElementById('skipBtn').addEventListener('click', () => { handleAction('skip'); });
        document.getElementById('endBtn').addEventListener('click', () => { handleAction('end'); });

        async function handleAction(action) {
            vibrate();
            await set(ref(db, `rooms/${roomId}/hangup`), true);
            cleanupLocally();

            if (action === 'skip') {
                await update(ref(db, 'users/' + currentUser.uid), { status: 'searching', matchedWith: null });
                window.location.href = `match.html?mode=${matchMode}`;
            } else {
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', matchedWith: null });
                window.location.href = 'home.html';
            }
        }

        function cleanupLocally() {
            clearInterval(callTimerInterval);
            if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            if(isCaller) remove(ref(db, `rooms/${roomId}`));
        }

    </script>
