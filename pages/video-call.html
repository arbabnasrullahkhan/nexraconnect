<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Live Call - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ULTRA PREMIUM TIKTOK-STYLE iOS VARIABLES ===== */
        :root {
            --bg-dark: #000000;
            --surface: rgba(20, 20, 25, 0.75);
            --surface-light: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --accent: #0A84FF;
            --premium: #FFD60A;
            --success: #32D74B;
            --danger: #FF453A;
            --blur: blur(35px);
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
            --safe-top: env(safe-area-inset-top, 16px);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { background-color: var(--bg-dark); color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; position: relative; }

        /* ===== VIDEO GRID ===== */
        .video-wrapper { position: absolute; inset: 0; z-index: 0; background: #111; display: grid; gap: 4px; transition: all 0.5s ease; }
        .video-wrapper.solo { display: block; padding: 0; }
        .remote-slot { width: 100%; height: 100%; position: relative; overflow: hidden; background: #111; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: filter 0.4s; }

        /* ===== LOCAL PIP VIDEO (0.7x ZOOM FIX) ===== */
        .local-pip { position: absolute; top: calc(var(--safe-top) + 75px); right: 16px; width: 110px; height: 160px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.3); z-index: 10; background: #000; cursor: move; transition: transform 0.2s var(--spring); }
        .local-pip:active { transform: scale(0.95); }
        #localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1) scale(1.05); filter: contrast(1.05) saturate(1.1); transition: filter 0.3s; }

        /* ===== TOP PREMIUM HEADER (SKIP BUTTON HERE) ===== */
        .top-header { position: absolute; top: var(--safe-top); left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 20; }
        
        .user-info-chip { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); backdrop-filter: var(--blur); padding: 6px 16px 6px 6px; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .profile-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .profile-details { display: flex; flex-direction: column; justify-content: center; }
        .profile-name { font-size: 1rem; font-weight: 800; display: flex; align-items: center; gap: 4px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .verified-tick { width: 16px; height: 16px; fill: var(--accent); }
        .profile-sub { font-size: 0.75rem; font-weight: 700; color: var(--premium); display: flex; align-items: center; gap: 4px; }
        
        .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .btn-skip { background: rgba(255,255,255,0.15); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); color: #fff; font-weight: 900; font-size: 0.95rem; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-skip:active { transform: scale(0.9); background: rgba(255,255,255,0.25); }
        .btn-skip svg { width: 20px; fill: currentColor; }
        
        .timer-badge { background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; display: flex; align-items: center; gap: 6px; border: 1px solid var(--glass-border); backdrop-filter: var(--blur); }
        .red-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ===== SIDE FLOATING ACTIONS (GIFTS & CHAT) ===== */
        .side-dock { position: absolute; right: 16px; bottom: calc(var(--safe-bottom) + 110px); display: flex; flex-direction: column; gap: 16px; z-index: 50; }
        .side-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--surface); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.2s; cursor: pointer; }
        .side-btn:active { transform: scale(0.85); }
        .side-btn.gift { background: linear-gradient(135deg, #FF2E93, #FF8A00); border: none; box-shadow: 0 10px 30px rgba(255, 46, 147, 0.5); animation: floatBtn 3s infinite ease-in-out; }
        .side-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.2; }
        @keyframes floatBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* ===== BOTTOM CONTROLS (EXACTLY 4 BUTTONS) ===== */
        .controls-dock { position: absolute; bottom: var(--safe-bottom); left: 50%; transform: translateX(-50%); display: flex; justify-content: space-between; gap: 12px; padding: 14px 24px; background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-radius: 40px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 100; width: 90%; max-width: 380px; }
        
        .ctrl-btn { width: 56px; height: 56px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s var(--spring); }
        .ctrl-btn svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .ctrl-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.25); }
        .ctrl-btn.off { background: #fff; color: #000; }
        
        .btn-end { background: var(--danger); }
        .btn-end svg { stroke: #fff; }
        .btn-end:active { background: #d32f2f; box-shadow: 0 0 20px rgba(255, 69, 58, 0.6); }

        /* ===== TIKTOK STYLE FULL-SCREEN GIFTS ===== */
        .gift-layer { position: absolute; inset: 0; z-index: 90; pointer-events: none; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .gift-anim-container { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: tiktokGift 4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .gift-img { font-size: 8rem; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); margin-bottom: 10px; }
        .gift-sender { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; border: 1px solid var(--premium); color: var(--premium); box-shadow: 0 10px 30px rgba(255, 214, 10, 0.4); }

        @keyframes tiktokGift {
            0% { transform: scale(0) translateY(200px) rotate(-15deg); opacity: 0; }
            15% { transform: scale(1.2) translateY(0) rotate(10deg); opacity: 1; }
            25% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
            80% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) translateY(-200px); opacity: 0; }
        }

        /* ===== FLOATING CHAT BUBBLES ===== */
        .floating-chat-layer { position: absolute; bottom: calc(var(--safe-bottom) + 100px); left: 16px; width: 70%; max-width: 280px; display: flex; flex-direction: column; gap: 8px; z-index: 30; pointer-events: none; justify-content: flex-end; height: 350px; overflow: hidden; }
        .chat-bubble { padding: 12px 18px; border-radius: 24px; font-size: 0.95rem; font-weight: 600; line-height: 1.4; word-wrap: break-word; backdrop-filter: var(--blur); animation: slideInBubble 0.4s var(--spring); transition: opacity 0.5s ease, transform 0.5s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .chat-local { background: var(--accent); color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }
        .chat-remote { background: rgba(20, 20, 25, 0.85); border: 1px solid var(--glass-border); color: #fff; border-bottom-left-radius: 4px; align-self: flex-start; }
        @keyframes slideInBubble { from { transform: translateY(20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* Quick Chat Input */
        .chat-input-panel { position: absolute; bottom: calc(var(--safe-bottom) + 110px); right: 80px; background: var(--surface); backdrop-filter: var(--blur); padding: 8px; border-radius: 30px; display: flex; gap: 8px; align-items: center; border: 1px solid var(--glass-border); opacity: 0; visibility: hidden; transform: translateX(20px); transition: 0.3s var(--spring); z-index: 50; }
        .chat-input-panel.show { opacity: 1; visibility: visible; transform: translateX(0); }
        .chat-input-panel input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px 20px; border-radius: 24px; outline: none; font-size: 1rem; width: 220px; }
        .send-btn { background: var(--accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* ===== 3-DOT MORE MENU (BOTTOM SHEET) ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(15px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s var(--spring); }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .bottom-sheet { width: 100%; max-width: 500px; background: #1C1C1E; border-radius: 32px 32px 0 0; padding: 24px 24px calc(var(--safe-bottom) + 20px); transform: translateY(100%); transition: 0.5s var(--spring); border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-overlay.open .bottom-sheet { transform: translateY(0); }
        .modal-drag { width: 44px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin: 0 auto 24px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 16px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .menu-icon { width: 64px; height: 64px; border-radius: 24px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; transition: 0.2s; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .menu-item:active .menu-icon { transform: scale(0.9); background: rgba(255,255,255,0.15); }
        .menu-icon svg { width: 28px; height: 28px; stroke: currentColor; fill: none; stroke-width: 2; }
        .menu-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-align: center; }
        .menu-item.danger .menu-icon { background: rgba(255, 69, 58, 0.15); color: var(--danger); border-color: rgba(255, 69, 58, 0.3); }

        /* Keyboard Hints */
        .key-hint { position: absolute; top: -10px; right: -10px; background: var(--premium); color: #000; font-size: 0.55rem; font-weight: 900; padding: 2px 6px; border-radius: 8px; border: 1px solid #000; z-index: 10; }

        /* ===== STATUS OVERLAY ===== */
        .status-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.5s; }
        .connecting-orb { width: 90px; height: 90px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); animation: spin 1s linear infinite; margin-bottom: 24px; box-shadow: 0 0 30px rgba(10, 132, 255, 0.5); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- 1. VIDEO GRID -->
    <div class="video-wrapper solo" id="videoGrid">
        <div class="remote-slot">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="local-pip" id="localVideoContainer">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <!-- 2. STATUS OVERLAY -->
    <div class="status-overlay" id="statusOverlay">
        <div class="connecting-orb"></div>
        <h2 style="font-size: 1.5rem; font-weight: 900;">Securing Connection</h2>
        <p style="color: var(--success); font-weight: 700; margin-top: 8px;">P2P Encryption Active</p>
    </div>

    <!-- 3. TOP PREMIUM HEADER (WITH SKIP BUTTON) -->
    <div class="top-header">
        <div class="user-info-chip">
            <img src="https://i.pravatar.cc/150?u=guest" class="profile-pic" id="peerPic" alt="">
            <div class="profile-details">
                <div class="profile-name">
                    <span id="peerName">Connecting...</span>
                    <svg class="verified-tick" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="profile-sub" id="peerLocation">🌍 Resolving...</div>
            </div>
        </div>

        <div class="header-actions">
            <button class="btn-skip" id="skipBtn" title="Instant Skip [S]">
                <div class="key-hint">S</div>
                Skip <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="3"/></svg>
            </button>
            <div class="timer-badge">
                <div class="red-dot"></div> <span id="callTimer">00:00</span>
            </div>
        </div>
    </div>

    <!-- 4. FLOATING CHAT LAYER -->
    <div class="floating-chat-layer" id="chatLayer"></div>

    <!-- 5. TIKTOK STYLE GIFT ANIMATION LAYER -->
    <div class="gift-layer" id="giftLayer"></div>

    <!-- 6. SIDE ACTIONS (CHAT & GIFT) -->
    <div class="chat-input-panel" id="chatPanel">
        <input type="text" id="chatInput" placeholder="Send a message..." autocomplete="off">
        <button class="send-btn" id="sendBtn">
            <svg width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>

    <div class="side-dock">
        <div class="side-btn gift" onclick="openModal('giftModal')" title="Send Gift [G]">
            <div class="key-hint">G</div>
            <svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        </div>
        <div class="side-btn" id="chatToggle" title="Chat [C]">
            <div class="key-hint">C</div>
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
    </div>

    <!-- 7. BOTTOM CONTROLS DOCK (EXACTLY 4 BUTTONS) -->
    <div class="controls-dock">
        <!-- Mic -->
        <button class="ctrl-btn" id="toggleAudio" title="Mute [M]">
            <div class="key-hint">M</div>
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <!-- Video -->
        <button class="ctrl-btn" id="toggleVideo" title="Camera [V]">
            <div class="key-hint">V</div>
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
        <!-- End Call -->
        <button class="ctrl-btn btn-end" id="endBtn" title="End Call [E]">
            <div class="key-hint">E</div>
            <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        </button>
        <!-- More Menu (3-Dot) -->
        <button class="ctrl-btn" onclick="openModal('moreModal')" title="More Options">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="12" r="1.5"/></svg>
        </button>
    </div>

    <!-- 8. MORE MENU (BOTTOM SHEET) -->
    <div class="modal-overlay" id="moreModal" onclick="if(event.target===this) closeModals()">
        <div class="bottom-sheet">
            <div class="modal-drag"></div>
            <div style="font-size: 1.3rem; font-weight: 900; margin-bottom: 24px; color: #fff;">Advanced Controls</div>
            
            <div class="menu-grid">
                <div class="menu-item" id="addFriendBtn">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></div>
                    <div class="menu-label">Add Friend</div>
                </div>
                <div class="menu-item" id="recordBtn">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></div>
                    <div class="menu-label">Record</div>
                </div>
                <div class="menu-item" onclick="switchCamera()">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg></div>
                    <div class="menu-label">Flip Cam</div>
                </div>
                <div class="menu-item" onclick="togglePiP()">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><rect x="11" y="11" width="8" height="6" rx="1" ry="1"/></svg></div>
                    <div class="menu-label">PiP Mode</div>
                </div>
                
                <!-- Filters -->
                <div class="menu-item" onclick="applyFilter('contrast(1.15) saturate(1.2) blur(0.5px)')">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
                    <div class="menu-label">Beauty Filter</div>
                </div>
                <div class="menu-item" onclick="applyFilter('none')">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>
                    <div class="menu-label">Clear Filter</div>
                </div>
                
                <div class="menu-item danger" onclick="alert('User Blocked & Reported. Skipping...'); document.getElementById('skipBtn').click();">
                    <div class="menu-icon"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="menu-label">Report</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 9. PREMIUM GIFTS MODAL -->
    <div class="modal-overlay" id="giftModal" onclick="if(event.target===this) closeModals()">
        <div class="bottom-sheet">
            <div class="modal-drag"></div>
            <div style="font-size: 1.3rem; font-weight: 900; margin-bottom: 20px; color: var(--premium);">TikTok Style Gifts</div>
            <div class="menu-grid">
                <div class="menu-item" onclick="sendGift('🌹', 'Rose')"><div class="menu-icon" style="font-size: 2.5rem; background: rgba(255,46,147,0.1); border-color: #FF2E93;">🌹</div><div class="menu-label">Rose</div></div>
                <div class="menu-item" onclick="sendGift('💎', 'Diamond')"><div class="menu-icon" style="font-size: 2.5rem; background: rgba(10,132,255,0.1); border-color: var(--accent);">💎</div><div class="menu-label">Diamond</div></div>
                <div class="menu-item" onclick="sendGift('🚀', 'Rocket')"><div class="menu-icon" style="font-size: 2.5rem; background: rgba(255,138,0,0.1); border-color: #FF8A00;">🚀</div><div class="menu-label">Rocket</div></div>
                <div class="menu-item" onclick="sendGift('🦁', 'Lion')"><div class="menu-icon" style="font-size: 2.5rem; background: rgba(255,214,10,0.1); border-color: var(--premium);">🦁</div><div class="menu-label">Lion</div></div>
            </div>
        </div>
    </div>

    <!-- 10. LOGIC & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, get, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // STUN/TURN Servers
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        let peerConnection, localStream, remoteStream, currentUser;
        let peerUid = null;
        let peerName = "Guest";
        let callTimerInterval = null;
        let callSeconds = 0;
        let facingMode = 'user';

        // Local Screen Recording Variables
        let mediaRecorder = null;
        let recordedChunks = [];

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const isCaller = urlParams.get('caller') === 'true';
        const matchMode = urlParams.get('mode') || 'random';

        if (!roomId) window.location.href = 'home.html';

        // UI Helpers
        window.openModal = (id) => document.getElementById(id).classList.add('open');
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));

        // Local Video Drag (PiP functionality for mobile)
        const pip = document.getElementById('localVideoContainer');
        let isDragging = false, startX, startY, initialX, initialY;
        pip.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; const rect = pip.getBoundingClientRect(); initialX = rect.left; initialY = rect.top; pip.style.transition = 'none'; });
        pip.addEventListener('touchmove', e => { if(!isDragging) return; e.preventDefault(); const dx = e.touches[0].clientX - startX; const dy = e.touches[0].clientY - startY; pip.style.left = `${initialX + dx}px`; pip.style.top = `${initialY + dy}px`; pip.style.right = 'auto'; });
        pip.addEventListener('touchend', () => { isDragging = false; pip.style.transition = 'transform 0.2s'; });

        // --- AUTH & INITIALIZE CALL ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                initCall();
            } else {
                window.location.href = '../index.html';
            }
        });

        async function initCall() {
            try {
                // 100% NOISE CANCELLATION & 4K/HD CONSTRAINTS
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: facingMode },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) {
                console.error("Camera Error:", err);
                alert("Camera/Mic permissions required.");
                window.location.href = 'home.html';
                return;
            }

            peerConnection = new RTCPeerConnection(configuration);
            remoteStream = new MediaStream();
            document.getElementById('remoteVideo').srcObject = remoteStream;

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                // Connection Established
                document.getElementById('statusOverlay').style.opacity = 0;
                setTimeout(() => document.getElementById('statusOverlay').style.display = 'none', 500);
                startCallTimer();
                fetchPeerProfile();
            };

            const callerCandidatesRef = ref(db, `rooms/${roomId}/callerCandidates`);
            const calleeCandidatesRef = ref(db, `rooms/${roomId}/calleeCandidates`);

            peerConnection.onicecandidate = event => {
                if (event.candidate) push(isCaller ? callerCandidatesRef : calleeCandidatesRef, event.candidate.toJSON());
            };

            // WEBRTC SIGNALING
            if (isCaller) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await set(ref(db, `rooms/${roomId}/offer`), { type: offer.type, sdp: offer.sdp });

                onValue(ref(db, `rooms/${roomId}/answer`), snapshot => {
                    const answer = snapshot.val();
                    if (!peerConnection.currentRemoteDescription && answer) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    }
                });
                onChildAdded(calleeCandidatesRef, snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));
                
                // Fetch opponent UID
                const s = await get(ref(db, 'users/' + currentUser.uid + '/matchedWith/targetUid'));
                if (s.exists()) peerUid = s.val();

            } else {
                onValue(ref(db, `rooms/${roomId}/offer`), async snapshot => {
                    const offer = snapshot.val();
                    if (offer && !peerConnection.currentRemoteDescription) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        await set(ref(db, `rooms/${roomId}/answer`), { type: answer.type, sdp: answer.sdp });
                    }
                });
                onChildAdded(callerCandidatesRef, snap => peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())));
                
                // Fetch caller UID
                const s = await get(ref(db, 'users/' + currentUser.uid + '/matchedWith/targetUid'));
                if (s.exists()) peerUid = s.val();
            }

            // Remote Hangup Listener
            onValue(ref(db, `rooms/${roomId}/hangup`), snapshot => {
                if (snapshot.val() === true) {
                    cleanupLocally();
                    window.location.href = `match.html?mode=${matchMode}`;
                }
            });

            setupChatAndGifts();
        }

        // --- FETCH REAL PROFILE (NAME & FLAGS) ---
        async function fetchPeerProfile() {
            if(!peerUid) return;
            const snap = await get(ref(db, 'users/' + peerUid));
            if(!snap.exists()) return;
            const p = snap.val();
            
            peerName = p.displayName || 'Guest User';
            document.getElementById('peerName').innerHTML = `${peerName} <svg class="verified-tick" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            if(p.photoURL) document.getElementById('peerPic').src = p.photoURL;
            
            // Map Country to Flag Emoji (Basic mappings)
            const flags = {"USA":"🇺🇸", "UK":"🇬🇧", "India":"🇮🇳", "Spain":"🇪🇸", "Canada":"🇨🇦"};
            const cName = p.country || 'Global';
            const flag = flags[cName] || '🌍';
            document.getElementById('peerLocation').innerHTML = `${flag} ${cName}`;
        }

        function startCallTimer() {
            if(callTimerInterval) return;
            callTimerInterval = setInterval(() => {
                callSeconds++;
                const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
                const s = String(callSeconds % 60).padStart(2, '0');
                document.getElementById('callTimer').textContent = `${m}:${s}`;
            }, 1000);
        }

        // --- HARDWARE & FILTER CONTROLS ---
        window.switchCamera = async () => {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            document.getElementById('localVideo').style.transform = facingMode === 'user' ? 'scaleX(-1) scale(1.05)' : 'scale(1.05)';
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1920 }, facingMode: facingMode }, audio: { echoCancellation: true, noiseSuppression: true }
            });
            document.getElementById('localVideo').srcObject = localStream;
            
            const videoTrack = localStream.getVideoTracks()[0];
            const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
            if (sender) sender.replaceTrack(videoTrack);
            closeModals();
        };

        window.applyFilter = (filter) => {
            document.getElementById('localVideo').style.filter = filter;
            closeModals();
        };

        window.togglePiP = async () => {
            closeModals();
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else if (document.pictureInPictureEnabled) await document.getElementById('remoteVideo').requestPictureInPicture();
            else alert("PiP is not supported by your browser/OS.");
        };

        let isMuted = false, isVideoOff = false;
        document.getElementById('toggleAudio').addEventListener('click', (e) => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            e.currentTarget.classList.toggle('off', isMuted);
        });

        document.getElementById('toggleVideo').addEventListener('click', (e) => {
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks()[0].enabled = !isVideoOff;
            e.currentTarget.classList.toggle('off', isVideoOff);
        });

        // --- LOCAL SCREEN & AUDIO RECORDING ---
        document.getElementById('recordBtn').addEventListener('click', async () => {
            closeModals();
            try {
                // Get system screen + audio
                const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: { preferCurrentTab: true }, audio: true });
                mediaRecorder = new MediaRecorder(displayStream, { mimeType: 'video/webm;codecs=vp9,opus' });
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Nexra_Call_${Date.now()}.webm`;
                    a.click();
                    recordedChunks = [];
                    alert('High-Quality Recording saved to your device!');
                };
                mediaRecorder.start();
                alert('Recording Started! It will auto-save when you stop sharing.');
            } catch (err) { alert('Recording permission denied.'); }
        });

        // --- FRIEND REQUESTS ---
        document.getElementById('addFriendBtn').addEventListener('click', async (e) => {
            if (!peerUid) return;
            await set(ref(db, `users/${peerUid}/friendRequests/${currentUser.uid}`), { timestamp: Date.now(), status: 'pending' });
            e.currentTarget.innerHTML = '<div class="menu-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="menu-label">Request Sent</div>';
        });

        // --- TIKTOK STYLE GIFTS & CHAT ---
        let chatMessagesArr = [];
        const chatLayer = document.getElementById('chatLayer');

        function setupChatAndGifts() {
            const messagesRef = ref(db, `rooms/${roomId}/messages`);
            onChildAdded(messagesRef, snapshot => {
                const msg = snapshot.val();
                
                if (msg.type === 'gift') {
                    playTikTokGift(msg.text, msg.giftName, msg.uid === currentUser.uid ? "You" : peerName);
                    return;
                }

                // Standard Chat
                const div = document.createElement('div');
                div.className = `chat-bubble ${msg.uid === currentUser.uid ? 'chat-local' : 'chat-remote'}`;
                div.textContent = msg.text;
                chatLayer.appendChild(div);
                
                chatMessagesArr.push(div);
                updateChatFading();

                setTimeout(() => {
                    div.style.opacity = '0';
                    div.style.transform = 'translateY(-20px) scale(0.8)';
                    setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); chatMessagesArr = chatMessagesArr.filter(d => d !== div); updateChatFading(); }, 500);
                }, 5000);
            });

            const send = async () => {
                const input = document.getElementById('chatInput');
                if (input.value.trim() && currentUser) {
                    await push(messagesRef, { type: 'text', uid: currentUser.uid, text: input.value.trim(), ts: Date.now() });
                    input.value = '';
                    document.getElementById('chatPanel').classList.remove('show');
                }
            };
            document.getElementById('sendBtn').addEventListener('click', send);
            document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key==='Enter') send(); });
        }

        function updateChatFading() {
            const total = chatMessagesArr.length;
            chatMessagesArr.forEach((node, idx) => {
                const pos = total - idx; 
                if(pos === 1) node.style.opacity = '1';
                else if(pos === 2) node.style.opacity = '0.8';
                else if(pos === 3) node.style.opacity = '0.5';
                else if(pos === 4) node.style.opacity = '0.2';
                else node.style.display = 'none'; 
            });
        }

        document.getElementById('chatToggle').addEventListener('click', () => {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('show');
            if(panel.classList.contains('show')) document.getElementById('chatInput').focus();
        });

        // Gift Sender Logic
        window.sendGift = async (emoji, name) => {
            closeModals();
            await push(ref(db, `rooms/${roomId}/messages`), { type: 'gift', uid: currentUser.uid, text: emoji, giftName: name, ts: Date.now() });
        };

        // Full Screen TikTok Animation
        function playTikTokGift(emoji, giftName, senderName) {
            const layer = document.getElementById('giftLayer');
            const container = document.createElement('div');
            container.className = 'gift-anim-container';
            
            container.innerHTML = `
                <div class="gift-img">${emoji}</div>
                <div class="gift-sender">${senderName} sent a ${giftName}!</div>
            `;
            
            layer.appendChild(container);
            setTimeout(() => { if(container.parentNode) container.parentNode.removeChild(container); }, 4000);
        }

        // --- END & INSTANT SKIP ---
        document.getElementById('skipBtn').addEventListener('click', () => { executeSkipOrEnd('skip'); });
        document.getElementById('endBtn').addEventListener('click', () => { executeSkipOrEnd('end'); });

        async function executeSkipOrEnd(action) {
            // Tell remote to hang up
            await set(ref(db, `rooms/${roomId}/hangup`), true);
            cleanupLocally();

            if (action === 'skip') {
                // Instant Skip -> No Loading
                await update(ref(db, 'users/' + currentUser.uid), { status: 'searching', matchedWith: null });
                window.location.href = `match.html?mode=${matchMode}`;
            } else {
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', matchedWith: null });
                window.location.href = 'home.html';
            }
        }

        function cleanupLocally() {
            clearInterval(callTimerInterval);
            if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
            if(isCaller) remove(ref(db, `rooms/${roomId}`));
        }

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', e => {
            if(e.target.tagName === 'INPUT') return; // Don't trigger if typing in chat
            const k = e.key.toLowerCase();
            if (k === 'm') document.getElementById('toggleAudio').click();
            if (k === 'v') document.getElementById('toggleVideo').click();
            if (k === 's') document.getElementById('skipBtn').click();
            if (k === 'e') document.getElementById('endBtn').click();
            if (k === 'c') document.getElementById('chatToggle').click();
            if (k === 'g') openModal('giftModal');
        });

    </script>
</body>
</html>
