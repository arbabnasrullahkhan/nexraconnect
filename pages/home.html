<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home - Nexra Connect</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#FF2E93;--primary-light:#FF8A00;--secondary:#7B2CBF;--bg:#0A0A0F;--text:#F9FAFB;--text-muted:#9CA3AF;--glass:rgba(0,0,0,0.35);--glass-border:rgba(255,255,255,0.1);--nav-h:68px;--green:#22C55E;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;background:#000;color:var(--text);overflow:hidden;}

        /* ===== FULL SCREEN CAMERA ===== */
        .camera-bg{position:fixed;inset:0;z-index:0;background:#111;}
        #selfieVideo{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
        .camera-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,transparent 20%,transparent 60%,rgba(0,0,0,0.6) 100%);pointer-events:none;}

        /* ===== TOP BAR ===== */
        .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));}
        .verified-badge{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(34,197,94,0.4);}
        .verified-badge svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}

        .mode-toggle{display:flex;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border-radius:25px;padding:4px;border:1px solid var(--glass-border);}
        .mode-btn{padding:8px 20px;border-radius:22px;border:none;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.3s;background:transparent;color:rgba(255,255,255,0.6);}
        .mode-btn.active{background:#fff;color:#111;box-shadow:0 2px 10px rgba(255,255,255,0.2);}

        .top-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;cursor:pointer;border:2px solid rgba(255,255,255,0.2);overflow:hidden;transition:transform 0.2s;}
        .top-avatar:hover{transform:scale(1.1);}

        /* ===== LEFT SIDE BUTTONS ===== */
        .side-btns{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:14px;}
        .side-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;position:relative;backdrop-filter:blur(10px);}
        .side-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
        .side-btn-crown{background:rgba(255,215,0,0.25);border:1px solid rgba(255,215,0,0.4);}
        .side-btn-crown svg{stroke:#FFD700;}
        .side-btn-history{background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);}
        .side-btn-chat{background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);}
        .side-btn-tags{background:rgba(255,46,147,0.2);border:1px solid rgba(255,46,147,0.3);}
        .side-btn-tags svg{stroke:var(--primary);}
        .side-btn-free{background:rgba(255,138,0,0.2);border:1px solid rgba(255,138,0,0.3);}
        .side-btn-free svg{stroke:var(--primary-light);}
        .side-btn .badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--primary);font-size:0.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #000;}

        .side-btn:hover{transform:scale(1.15);}

        /* ===== BOTTOM SECTION ===== */
        .bottom-section{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 16px;padding-bottom:max(calc(var(--nav-h) + 12px),calc(var(--nav-h) + env(safe-area-inset-bottom)));}

        .gender-selector{display:flex;justify-content:center;margin-bottom:12px;}
        .gender-pill{padding:10px 32px;border-radius:30px;background:rgba(255,255,255,0.95);color:#111;font-weight:700;font-size:0.95rem;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
        .gender-pill:hover{transform:scale(1.05);}

        .start-btn{width:100%;padding:18px;border-radius:16px;border:none;background:linear-gradient(135deg, #FFE500, #FFB800);color:#111;font-weight:900;font-size:1.15rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 8px 25px rgba(255,229,0,0.3);display:flex;align-items:center;justify-content:center;gap:10px;animation:pulseBtn 2s infinite;}
        .start-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 35px rgba(255,229,0,0.5);animation:none;}
        .start-btn:active{transform:scale(0.97);}
        
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(255, 229, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 229, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 229, 0, 0); }
        }

        /* Premium Banner */
        .premium-banner{margin-top:10px;padding:10px 16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,46,147,0.15),rgba(255,138,0,0.1));border:1px solid rgba(255,46,147,0.2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.3s;}
        .premium-banner:hover{background:linear-gradient(135deg,rgba(255,46,147,0.25),rgba(255,138,0,0.15));}
        .premium-info{display:flex;align-items:center;gap:8px;font-size:0.85rem;font-weight:600;color:#FFD700;}
        .premium-tag{padding:4px 10px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:0.75rem;font-weight:800;}

        /* ===== BOTTOM NAV ===== */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);z-index:200;padding-bottom:env(safe-area-inset-bottom);}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 18px;position:relative;transition:all 0.3s;}
        .nav-item svg{width:24px;height:24px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all 0.3s;}
        .nav-item span{font-size:0.65rem;font-weight:600;color:var(--text-muted);transition:color 0.3s;}
        .nav-item.active svg{stroke:var(--primary);}
        .nav-item.active span{color:var(--primary);}
        .nav-item.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:0 0 3px 3px;}

        /* ===== GENDER MODAL ===== */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);}
        .modal-overlay.open{display:flex;animation:fadeInModal 0.3s;}
        @keyframes fadeInModal{from{opacity:0;}to{opacity:1;}}
        .modal-sheet{width:100%;max-width:420px;background:var(--bg);border-radius:24px 24px 0 0;padding:24px 20px 32px;animation:slideUpModal 0.4s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes slideUpModal{from{transform:translateY(100%);}to{transform:translateY(0);}}
        .modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:4px;margin:0 auto 20px;}
        .modal-title{font-size:1.2rem;font-weight:800;text-align:center;margin-bottom:16px;}
        .gender-grid{display:flex;gap:12px;}
        .gender-option{flex:1;padding:18px 12px;border-radius:16px;border:2px solid var(--glass-border);background:var(--glass);text-align:center;cursor:pointer;transition:all 0.3s;font-weight:700;font-size:1rem;}
        .gender-option .emoji{font-size:2rem;display:block;margin-bottom:8px;}
        .gender-option.selected{border-color:var(--primary);background:rgba(255,46,147,0.1);box-shadow:0 0 20px rgba(255,46,147,0.15);}

        /* ===== COINS INFO ===== */
        .coins-float{position:fixed;top:14px;right:60px;z-index:100;padding:6px 14px;border-radius:20px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,215,0,0.3);display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.85rem;color:#FFD700;cursor:pointer;transition:transform 0.2s;}
        .coins-float:hover{transform:scale(1.05);}

        /* RESPONSIVE */
        @media(min-width:769px){.side-btns{left:24px;} .bottom-section{max-width:480px;left:50%;transform:translateX(-50%);}}
        @media(min-width:1025px){.bottom-nav{left:50%;transform:translateX(-50%);max-width:480px;border-radius:24px 24px 0 0;border:1px solid var(--glass-border);border-bottom:none;} .side-btns{left:calc(50% - 280px);}}
    </style>
</head>
<body>

    <!-- CAMERA BACKGROUND -->
    <div class="camera-bg">
        <video id="selfieVideo" autoplay playsinline muted></video>
    </div>
    <div class="camera-overlay"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="verified-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" id="soloMode">SOLO</button>
            <button class="mode-btn" id="squadMode">SQUAD</button>
        </div>
        <div class="coins-float" id="coinsFloat">💰 <span id="coinsCount">10</span></div>
        <div class="top-avatar" id="topAvatar" onclick="location.href='profile.html'">?</div>
    </div>

    <!-- LEFT SIDE BUTTONS -->
    <div class="side-btns">
        <button class="side-btn side-btn-crown" title="Premium" onclick="location.href='profile.html'">
            <svg viewBox="0 0 24 24"><path d="M2 4l3 12h14l3-12-5 4-5-4-5 4-3-4z"/><rect x="4" y="18" width="16" height="2" rx="1"/></svg>
        </button>
        <button class="side-btn side-btn-history" title="History">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="side-btn side-btn-chat" title="Chat" onclick="location.href='chat.html'">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="side-btn side-btn-tags" title="Interests" onclick="location.href='profile.html'">
            <svg viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
        </button>
        <button class="side-btn side-btn-free" title="Free Coins">
            <svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
            <div class="badge">!</div>
        </button>
    </div>

    <!-- BOTTOM SECTION -->
    <div class="bottom-section">
        <div class="gender-selector">
            <button class="gender-pill" id="genderPill" onclick="document.getElementById('genderModal').classList.add('open')">
                👫 Both
            </button>
        </div>
        <button class="start-btn" id="startBtn">Start Video Chat</button>
        <div class="premium-banner" onclick="location.href='profile.html'">
            <div class="premium-info">🌟 Enjoy with Nexra Plus</div>
            <div class="premium-tag">UPGRADE</div>
        </div>
    </div>

    <!-- GENDER MODAL -->
    <div class="modal-overlay" id="genderModal" onclick="if(event.target===this)this.classList.remove('open')">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">I want to match with</div>
            <div class="gender-grid">
                <div class="gender-option selected" data-g="both" onclick="selectGender(this)">
                    <span class="emoji">👫</span>Both
                </div>
                <div class="gender-option" data-g="male" onclick="selectGender(this)">
                    <span class="emoji">👨</span>Male
                </div>
                <div class="gender-option" data-g="female" onclick="selectGender(this)">
                    <span class="emoji">👩</span>Female
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.href='home.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="location.href='chat.html'">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Chat</span>
        </div>
        <div class="nav-item" onclick="location.href='profile.html'">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profile</span>
        </div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let selectedGenderPref = 'both';

        // Start Camera immediately
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 720 }, height: { ideal: 1280 } },
                    audio: false
                });
                document.getElementById('selfieVideo').srcObject = stream;
            } catch (e) {
                console.log('Camera preview unavailable:', e);
            }
        }
        startCamera();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await update(ref(db, 'users/' + user.uid), { status: 'online', roomId: null, lastSeen: Date.now() });
                
                const snap = await get(ref(db, 'users/' + user.uid));
                const profile = snap.exists() ? snap.val() : {};

                if (profile.coins === undefined) {
                    await update(ref(db, 'users/' + user.uid), { coins: 10 });
                    profile.coins = 10;
                }

                // UI
                const name = user.isAnonymous ? 'G' : ((profile.displayName || user.displayName || 'U')[0].toUpperCase());
                document.getElementById('topAvatar').textContent = name;
                document.getElementById('coinsCount').textContent = profile.coins || 0;

                // Live coins
                onValue(ref(db, 'users/' + user.uid + '/coins'), (s) => {
                    document.getElementById('coinsCount').textContent = s.val() || 0;
                });
            } else {
                window.location.href = '../index.html';
            }
        });

        // Gender selection
        window.selectGender = function(el) {
            document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedGenderPref = el.dataset.g;
            const emojis = { both: '👫', male: '👨', female: '👩' };
            const labels = { both: 'Both', male: 'Male', female: 'Female' };
            document.getElementById('genderPill').innerHTML = `${emojis[selectedGenderPref]} ${labels[selectedGenderPref]}`;
            document.getElementById('genderModal').classList.remove('open');
        };

        // SOLO/SQUAD
        document.getElementById('soloMode').addEventListener('click', () => {
            document.getElementById('soloMode').classList.add('active');
            document.getElementById('squadMode').classList.remove('active');
        });
        document.getElementById('squadMode').addEventListener('click', () => {
            document.getElementById('squadMode').classList.add('active');
            document.getElementById('soloMode').classList.remove('active');
        });

        // START
        document.getElementById('startBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            
            let mode = 'random';
            if (selectedGenderPref !== 'both') {
                // Gender specific = premium
                const snap = await get(ref(db, 'users/' + currentUser.uid));
                const profile = snap.val();
                if ((profile.coins || 0) < 1) {
                    alert('Gender matching requires 1 coin! Get more coins from Profile.');
                    return;
                }
                // Check user has their own gender set
                if (!profile.gender) {
                    alert('Set your own gender in Profile first!');
                    return;
                }
                mode = 'premium';
                await update(ref(db, 'users/' + currentUser.uid), { matchGenderPref: selectedGenderPref });
            }

            await update(ref(db, 'users/' + currentUser.uid), {
                status: 'searching',
                matchMode: mode,
                searchStartTime: Date.now()
            });

            window.location.href = `match.html?mode=${mode}`;
        });
    </script>
</body>
</html>
