<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Home - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ULTRA PREMIUM PRO iOS VARIABLES ===== */
        :root {
            --accent: #0A84FF;        
            --accent-glow: rgba(10, 132, 255, 0.4);
            --bg-dark: #000000;       
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --premium: #F5C518;       
            --blur-heavy: blur(40px);
            --nav-h: 85px;
            --safe-bottom: env(safe-area-inset-bottom, 24px);
            --safe-top: env(safe-area-inset-top, 20px);
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; width: 100%; }

        /* ===== ENHANCED CAMERA (NO STRETCH, NO DOTS) ===== */
        .camera-container { 
            position: fixed; inset: 0; z-index: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }
        
        /* 
           FIXED STRETCHING: object-fit: cover ensures ratio is maintained perfectly.
           FIXED DOTS: Soft blur + contrast acts as AI noise reduction.
        */
        #selfieVideo { 
            width: 100vw; height: 100vh; 
            object-fit: cover; object-position: center; 
            transform: scaleX(-1); /* Default Mirror */
            transition: transform 0.2s ease-out; /* Smooth Zooming */
            filter: blur(0.3px) contrast(1.08) brightness(1.05) saturate(1.15); 
            -webkit-filter: blur(0.3px) contrast(1.08) brightness(1.05) saturate(1.15);
        }

        .camera-overlay { position: fixed; inset: 0; z-index: 1; background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.3) 100%), linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 15%, transparent 60%, rgba(0,0,0,0.9) 100%); pointer-events: none; }

        /* ===== CAMERA ZOOM SLIDER (LEFT SIDE) ===== */
        .zoom-container {
            position: fixed; left: 16px; top: 50%; transform: translateY(-50%); z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.4); padding: 16px 8px; border-radius: 30px;
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
        }
        .zoom-icon { font-size: 14px; font-weight: 800; color: #fff; }
        .zoom-slider-wrapper { height: 150px; display: flex; align-items: center; justify-content: center; }
        /* Vertical Slider Hack */
        input[type="range"] {
            -webkit-appearance: none; width: 150px; height: 4px; background: rgba(255,255,255,0.3); 
            border-radius: 2px; outline: none; transform: rotate(-90deg);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; 
            background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); cursor: pointer;
        }

        /* ===== DYNAMIC ISLAND HEADER ===== */
        .island-container { position: fixed; top: var(--safe-top); left: 0; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 16px; margin-top: 10px; }
        .dynamic-island { background: #000000; border-radius: 40px; height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; width: 100%; max-width: 480px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); }
        
        .island-left { display: flex; align-items: center; gap: 8px; padding-left: 8px; }
        .island-logo { width: 30px; height: 30px; border-radius: 50%; }
        .online-dot { width: 6px; height: 6px; background: #34C759; border-radius: 50%; box-shadow: 0 0 10px #34C759; animation: pulseGreen 2s infinite; }
        
        .mode-switch { display: flex; background: rgba(255,255,255,0.12); border-radius: 30px; padding: 3px; position: relative; }
        .mode-btn { padding: 8px 18px; border-radius: 20px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.3s var(--spring); background: transparent; color: var(--text-muted); position: relative; z-index: 2; letter-spacing: 0.5px; }
        .mode-btn.active { color: #000; }
        .mode-indicator { position: absolute; height: calc(100% - 6px); top: 3px; border-radius: 20px; background: #FFFFFF; z-index: 1; transition: all 0.3s var(--spring); }

        .island-right { padding-right: 6px; }
        .wallet-pill { background: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 0.85rem; color: #FFF; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .wallet-pill:active { transform: scale(0.95); }

        @keyframes pulseGreen { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } }

        /* ===== RIGHT FLOATING ACTIONS ===== */
        .right-actions { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 16px; }
        .action-fab { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .action-fab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .action-fab:active { transform: scale(0.9); }
        
        .fab-premium { background: var(--text-main); color: #000; border: none; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .fab-premium svg { stroke: #000; fill: #000; }
        .fab-filter { background: rgba(10, 132, 255, 0.15); border-color: rgba(10, 132, 255, 0.3); color: var(--accent); }
        
        .badge { position: absolute; top: -2px; right: -2px; background: #FF3B30; color: #fff; font-size: 0.65rem; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }

        /* ===== SQUAD SIZE SELECTOR ===== */
        .squad-selector { position: fixed; bottom: calc(var(--nav-h) + 210px); left: 50%; transform: translateX(-50%) translateY(20px); z-index: 90; display: flex; gap: 8px; background: var(--glass-bg); backdrop-filter: var(--blur-heavy); padding: 8px; border-radius: 24px; border: 1px solid var(--glass-border); opacity: 0; visibility: hidden; transition: all 0.4s var(--spring); }
        .squad-selector.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .squad-opt { width: 44px; height: 44px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .squad-opt.active { background: #FFFFFF; color: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* ===== BOTTOM CONTROLS ===== */
        .bottom-controls { position: fixed; bottom: calc(var(--nav-h) + 20px); left: 0; right: 0; z-index: 100; padding: 0 24px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; margin: 0 auto; }

        .filters-row { display: flex; gap: 12px; width: 100%; margin-bottom: 20px; }
        .filter-pill { flex: 1; background: var(--glass-bg); backdrop-filter: var(--blur-heavy); border: 1px solid var(--glass-border); padding: 14px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; white-space: nowrap; }
        .filter-pill:active { transform: scale(0.96); }

        .start-btn { width: 100%; padding: 22px; border-radius: 24px; border: none; background: #FFFFFF; color: #000000; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: all 0.3s var(--spring); box-shadow: 0 10px 40px rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; gap: 12px; }
        .start-btn svg { width: 26px; height: 26px; fill: #000; }
        .start-btn:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        
        .start-btn.loading { background: rgba(255,255,255,0.8); color: transparent; pointer-events: none; }
        .spinner { position: absolute; width: 26px; height: 26px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        .start-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== iOS FLOATING DOCK ===== */
        .dock-container { position: fixed; bottom: var(--safe-bottom); left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 440px; height: 70px; background: rgba(28, 28, 30, 0.85); backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy); border: 1px solid var(--glass-border); border-radius: 35px; z-index: 200; display: flex; justify-content: space-around; align-items: center; padding: 0 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        
        .dock-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text-muted); transition: 0.3s; height: 100%; }
        .dock-item svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.2; transition: 0.3s; }
        .dock-item span { font-size: 0.7rem; font-weight: 700; transition: 0.3s; }
        
        .dock-item.active { color: #fff; }
        .dock-item.active svg { stroke: var(--accent); transform: translateY(-3px); }

        /* ===== MODALS ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.4s var(--spring); }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        
        .modal-sheet { width: 100%; max-width: 500px; background: #1C1C1E; border-radius: 32px 32px 0 0; padding: 24px 24px var(--safe-bottom); transform: translateY(100%); transition: transform 0.5s var(--spring); position: relative; border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-drag { width: 44px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin: 0 auto 24px; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .modal-close { background: rgba(255,255,255,0.1); border: none; width: 34px; height: 34px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        
        .grid-list { display: flex; flex-direction: column; gap: 12px; max-height: 50vh; overflow-y: auto; padding-bottom: 10px; }
        .option-card { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .option-card.selected { border-color: var(--accent); background: rgba(10, 132, 255, 0.15); box-shadow: 0 10px 25px var(--accent-glow); }
        .option-card-left { display: flex; align-items: center; gap: 14px; font-weight: 700; font-size: 1.1rem; }
        .premium-lock { background: rgba(245, 197, 24, 0.2); color: var(--premium); padding: 6px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; display: flex; align-items: center; gap: 4px; }

    </style>
</head>
<body>

    <!-- 1. ENHANCED CAMERA (No Stretch, No Dots, Zoomable) -->
    <div class="camera-container">

            <div class="mode-switch" id="modeSwitch">

    <!-- 5. SQUAD SIZE SELECTOR -->
    <div class="squad-selector" id="squadSelector">
        <div class="squad-opt active" onclick="setSquadSize(2, this)">2</div>
        <div class="squad-opt" onclick="setSquadSize(3, this)">3</div>
        <div class="squad-opt" onclick="setSquadSize(4, this)">4</div>
        <div class="squad-opt" onclick="setSquadSize(6, this)">6</div>

    <!-- 6. BOTTOM CONTROLS -->
    <div class="bottom-controls">
        <div class="filters-row">
            <button class="filter-pill" id="locationPill" onclick="openModal('locationModal')">🌍 Global</button>
            <button class="filter-pill" id="genderPill" onclick="openModal('genderModal')">👫 Both</button>
        </div>
        <button class="start-btn" id="startBtn">
            <div class="spinner"></div>
            <span>Start Matching</span>
        </button>
    </div>

    <!-- 7. iOS FLOATING DOCK -->
    <nav class="dock-container">
        <div class="dock-item active" onclick="location.href='home.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="dock-item" onclick="location.href='chat.html'">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Chats</span>
        </div>
        <div class="dock-item" onclick="location.href='profile.html'">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profile</span>
        </div>
    </nav>

    <!-- ALL MODALS (GENDER, LOCATION, FILTERS, PREMIUM) OMITTED FOR BREVITY, 
         THEY ARE EXACTLY THE SAME AS PREVIOUS CODE, JUST ADD THEM HERE -->
    
    <!-- GENDER MODAL -->
    <div class="modal-overlay" id="genderModal" onclick="if(event.target===this) closeModals()">
        <div class="modal-sheet">
            <div class="modal-drag"></div>
            <div class="modal-header">
                <div class="modal-title">Gender Preferences</div>
                <button class="modal-close" onclick="closeModals()">✕</button>

                    <div class="option-card-left"><span class="emoji">👫</span> Both (Free)</div>

                </div>
                <div class="option-card" data-val="male" onclick="selectPref('gender', this, '👨 Male')">
                    <div class="option-card-left"><span class="emoji">👨</span> Male Only</div>
                    <div class="premium-lock">Plus</div>
                </div>
                <div class="option-card" data-val="female" onclick="selectPref('gender', this, '👩 Female')">
                    <div class="option-card-left"><span class="emoji">👩</span> Female Only</div>

    <!-- LOCATION MODAL -->
    <div class="modal-overlay" id="locationModal" onclick="if(event.target===this) closeModals()">
        <div class="modal-sheet">
            <div class="modal-drag"></div>
            <div class="modal-header">
                <div class="modal-title">Location Filter</div>
                <button class="modal-close" onclick="closeModals()">✕</button>
            </div>
            <div class="grid-list">
                <div class="option-card selected" data-val="global" onclick="selectPref('location', this, '🌍 Global')">
                    <div class="option-card-left"><span class="emoji">🌍</span> Global Match</div>
                </div>
                <div class="option-card" data-val="country" onclick="selectPref('location', this, '🇺🇸 Country')">
                    <div class="option-card-left"><span class="emoji">🇺🇸</span> Select Country</div>
                    <div class="premium-lock">Plus</div>

    <!-- PREMIUM MODAL -->
    <div class="modal-overlay" id="premiumModal" onclick="if(event.target===this) closeModals()">
        <div class="modal-sheet" style="max-width: 550px;">
            <div class="modal-drag"></div>
            <div class="modal-header">
                <div class="modal-title" style="color: var(--premium);">Nexra Plus Pro</div>
                <button class="modal-close" onclick="closeModals()">✕</button>
            </div>
            <div style="text-align: center; margin-bottom: 20px; color: #fff;">Unlock Location, Gender Filters & AR Masks!</div>

    <!-- FIREBASE & CAMERA ZOOM LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let currentMode = 'solo';
        let squadSize = 2;
        let selectedGender = 'both';
        let selectedLocation = 'global';

        // --- CAMERA WITH HARDWARE/SOFTWARE ZOOM ---
        let videoTrack;
        async function startCamera() {
            const video = document.getElementById('selfieVideo');
            const zoomSlider = document.getElementById('zoomSlider');
            
            try {
                // Request 1080p for stable Aspect Ratio (avoids stretched face)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];

                // Check capabilities for Hardware Zoom
                const capabilities = videoTrack.getCapabilities();
                if (capabilities.zoom) {
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.step = capabilities.zoom.step || 0.1;
                    zoomSlider.value = videoTrack.getSettings().zoom || 1;
                    
                    zoomSlider.addEventListener('input', (e) => {
                        videoTrack.applyConstraints({ advanced: [{ zoom: e.target.value }] });
                    });
                } else {
                    // Fallback to Software (CSS) Zoom without breaking Aspect Ratio
                    zoomSlider.addEventListener('input', (e) => {
                        const val = e.target.value;
                        // scaleX(-val) keeps it mirrored, scaleY(val) zooms vertically perfectly.
                        video.style.transform = `scaleX(-${val}) scaleY(${val})`;
                    });
                }
            } catch (e) {
                console.log('Camera error:', e);
            }
        }
        startCamera();

        // UI Controls (Solo/Squad)
        window.setMode = (mode) => {
            currentMode = mode;
            document.getElementById('btnSolo').classList.toggle('active', mode === 'solo');
            document.getElementById('btnSquad').classList.toggle('active', mode === 'squad');
            document.getElementById('modeIndicator').style.left = mode === 'solo' ? '0' : '50%';
            document.getElementById('squadSelector').classList.toggle('show', mode === 'squad');
        };

        window.setSquadSize = (size, el) => {
            squadSize = size;
            document.querySelectorAll('.squad-opt').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        };

        // Modals
        window.openModal = (id) => document.getElementById(id).classList.add('open');
        window.openPremiumModal = () => document.getElementById('premiumModal').classList.add('open');
        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));

        window.selectPref = (type, el, label) => {
            const val = el.dataset.val;
            if (val !== 'both' && val !== 'global' && val !== 'none') {
                closeModals();
                setTimeout(() => openPremiumModal(), 300);
                return;
            }
            const parent = el.closest('.grid-list');
            parent.querySelectorAll('.option-card').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            
            if (type === 'gender') {
                selectedGender = val;
                document.getElementById('genderPill').innerHTML = label;
            } else if (type === 'location') {
                selectedLocation = val;
                document.getElementById('locationPill').innerHTML = label;
            }
            setTimeout(() => closeModals(), 200);
        };

        // Start Matching logic
        document.getElementById('startBtn').addEventListener('click', async function() {
            if (!currentUser) { alert('Please login first'); return; }
            let mode = currentMode === 'squad' ? `squad_${squadSize}` : 'random';
            this.classList.add('loading');
            
            await update(ref(db, 'users/' + currentUser.uid), {
                status: 'searching', matchMode: mode, searchStartTime: Date.now()
            });
            setTimeout(() => { window.location.href = `match.html?mode=${mode}`; }, 500);
        });

        // Authentication state
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(ref(db, 'users/' + user.uid));
                document.getElementById('coinsCount').textContent = snap.exists() ? snap.val().coins || 0 : 0;
            } else {
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
