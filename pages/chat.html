<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Nexra Connect</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF2E93;
            --primary-light: #FF8A00;
            --secondary: #7B2CBF;
            --bg: #0A0A0F;
            --surface: #15151E;
            --surface-light: #1E1E2E;
            --text: #F9FAFB;
            --text-muted: #9CA3AF;
            --glass-border: rgba(255,255,255,0.08);
            --nav-h: 70px;
            --header-h: 60px;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;background:var(--bg);color:var(--text);overflow-x:hidden;}
        body{padding-top:var(--header-h);padding-bottom:var(--nav-h);}

        .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);display:flex;align-items:center;justify-content:center;padding:0 16px;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);z-index:1000;}
        .header h2{font-size:1.1rem;font-weight:800;}

        .content{padding:16px;overflow-y:auto;height:calc(100vh - var(--header-h) - var(--nav-h));}

        /* Empty State */
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px 20px;}
        .empty-state .emoji{font-size:4rem;margin-bottom:20px;}
        .empty-state h3{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
        .empty-state p{color:var(--text-muted);font-size:0.95rem;line-height:1.5;max-width:300px;}

        /* Friends List */
        .friend-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border-radius:16px;margin-bottom:10px;border:1px solid var(--glass-border);cursor:pointer;transition:all 0.3s;}
        .friend-item:hover{background:var(--surface-light);transform:translateX(4px);}
        .friend-item:active{transform:scale(0.98);}
        .friend-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;flex-shrink:0;}
        .friend-info{flex:1;min-width:0;}
        .friend-name{font-weight:700;font-size:1rem;margin-bottom:2px;}
        .friend-last-msg{color:var(--text-muted);font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .friend-time{font-size:0.75rem;color:var(--text-muted);flex-shrink:0;}
        .unread-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0;}

        /* Chat View */
        .chat-view{display:none;flex-direction:column;height:100%;}
        .chat-header-bar{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--glass-border);margin-bottom:12px;}
        .back-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:12px;transition:background 0.2s;}
        .back-btn:hover{background:var(--surface-light);}
        .back-btn svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
        .chat-header-name{font-weight:800;font-size:1.1rem;}

        .messages-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0;}
        .messages-area::-webkit-scrollbar{width:4px;}
        .messages-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}

        .chat-msg{max-width:80%;padding:10px 16px;border-radius:18px;font-size:0.95rem;line-height:1.4;word-wrap:break-word;animation:msgIn 0.3s ease;}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        .chat-msg.mine{align-self:flex-end;background:linear-gradient(135deg,var(--secondary),var(--primary));border-bottom-right-radius:4px;}
        .chat-msg.theirs{align-self:flex-start;background:var(--surface-light);border-bottom-left-radius:4px;}

        .chat-input-bar{display:flex;gap:10px;padding-top:12px;border-top:1px solid var(--glass-border);margin-top:auto;}
        .chat-input-bar input{flex:1;padding:12px 16px;border-radius:20px;border:1px solid var(--glass-border);background:var(--surface);color:var(--text);font-size:1rem;outline:none;transition:border-color 0.3s;}
        .chat-input-bar input:focus{border-color:var(--primary);}
        .chat-input-bar input::placeholder{color:var(--text-muted);}
        .chat-send-btn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;}
        .chat-send-btn:hover{transform:scale(1.1);}
        .chat-send-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

        /* Bottom Nav */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);display:flex;align-items:center;justify-content:space-around;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);z-index:1000;padding-bottom:env(safe-area-inset-bottom);}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 20px;border-radius:16px;transition:all 0.3s;position:relative;}
        .nav-item svg{width:24px;height:24px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all 0.3s;}
        .nav-item span{font-size:0.7rem;font-weight:600;color:var(--text-muted);transition:color 0.3s;}
        .nav-item.active svg{stroke:var(--primary);}
        .nav-item.active span{color:var(--primary);}
        .nav-item.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:0 0 3px 3px;}

        @media(min-width:481px){.content{max-width:540px;margin:0 auto;}}
        @media(min-width:769px){.content{max-width:600px;}}
        @media(min-width:1025px){.bottom-nav{left:50%;transform:translateX(-50%);max-width:500px;border-radius:24px 24px 0 0;border:1px solid var(--glass-border);border-bottom:none;}}
    </style>
</head>
<body>

    <div class="header"><h2>💬 Chat</h2></div>

    <div class="content">
        <!-- FRIENDS LIST VIEW -->
        <div id="friendsListView">
            <div id="friendsList">
                <!-- Populated by JS -->
            </div>
            <div class="empty-state" id="emptyState">
                <div class="emoji">💬</div>
                <h3>No Friends Yet</h3>
                <p>Start a video call and tap "Add Friend" to build your connections!</p>
            </div>
        </div>

        <!-- CHAT VIEW (hidden by default) -->
        <div class="chat-view" id="chatView">
            <div class="chat-header-bar">
                <button class="back-btn" id="backBtn">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div class="friend-avatar" id="chatAvatar" style="width:36px;height:36px;font-size:0.9rem;">?</div>
                <div class="chat-header-name" id="chatHeaderName">User</div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="chat-input-bar">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
                <button class="chat-send-btn" id="sendMsgBtn">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='home.html'">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item active" onclick="location.href='chat.html'">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Chat</span>
        </div>
        <div class="nav-item" onclick="location.href='profile.html'">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profile</span>
        </div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, onValue, push, set, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let currentChatFriendId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadFriends();
            } else {
                window.location.href = '../index.html';
            }
        });

        function loadFriends() {
            const friendsRef = ref(db, 'users/' + currentUser.uid + '/friends');
            onValue(friendsRef, async (snapshot) => {
                const friendsList = document.getElementById('friendsList');
                const emptyState = document.getElementById('emptyState');
                friendsList.innerHTML = '';

                if (!snapshot.exists()) {
                    emptyState.style.display = 'flex';
                    return;
                }

                emptyState.style.display = 'none';
                const friends = snapshot.val();

                for (const friendId in friends) {
                    const friendSnap = await get(ref(db, 'users/' + friendId));
                    if (!friendSnap.exists()) continue;
                    const friend = friendSnap.val();
                    const name = friend.displayName || 'User';

                    const div = document.createElement('div');
                    div.className = 'friend-item';
                    div.innerHTML = `
                        <div class="friend-avatar">${name[0].toUpperCase()}</div>
                        <div class="friend-info">
                            <div class="friend-name">${name}</div>
                            <div class="friend-last-msg">Tap to chat</div>
                        </div>
                    `;
                    div.addEventListener('click', () => openChat(friendId, name));
                    friendsList.appendChild(div);
                }
            });
        }

        function openChat(friendId, friendName) {
            currentChatFriendId = friendId;
            document.getElementById('friendsListView').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('chatHeaderName').textContent = friendName;
            document.getElementById('chatAvatar').textContent = friendName[0].toUpperCase();

            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';

            // Generate chat ID (sorted UIDs for consistency)
            const chatId = [currentUser.uid, friendId].sort().join('_');
            const messagesRef = ref(db, 'chats/' + chatId + '/messages');

            onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const div = document.createElement('div');
                div.className = 'chat-msg ' + (msg.uid === currentUser.uid ? 'mine' : 'theirs');
                div.textContent = msg.text;
                messagesArea.appendChild(div);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        // Back button
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('chatView').style.display = 'none';
            document.getElementById('friendsListView').style.display = 'block';
            currentChatFriendId = null;
        });

        // Send message
        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentChatFriendId) return;

            const chatId = [currentUser.uid, currentChatFriendId].sort().join('_');
            await push(ref(db, 'chats/' + chatId + '/messages'), {
                uid: currentUser.uid,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
        }

        document.getElementById('sendMsgBtn').addEventListener('click', sendMsg);
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
