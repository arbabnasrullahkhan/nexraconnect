<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Matchmaking - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== PREMIUM REALISTIC iOS VARIABLES ===== */
        :root {
            --bg-dark: #000000;
            --surface: rgba(30, 30, 35, 0.7);
            --surface-light: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --text-muted: #98989D;
            --accent: #0A84FF;
            --premium: #FFD60A;
            --success: #32D74B;
            --danger: #FF453A;
            --blur: blur(30px);
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; width: 100%; }

        /* ===== CAMERA BACKGROUND (0.7x ZOOM FIX) ===== */
        .live-bg { position: fixed; inset: 0; z-index: 0; background: #000; overflow: hidden; }
        #localVideoBg { width: 100%; height: 100%; object-fit: cover; object-position: center; transform: scaleX(-1) scale(1.05); filter: brightness(0.4) contrast(1.1) blur(8px); transition: all 0.5s ease; }
        .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 40%, rgba(0,0,0,0.8) 100%); }

        /* ===== REALISTIC SEARCHING UI ===== */
        #searchingUI { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        
        .search-card { background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 36px; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 85%; max-width: 340px; }

        .avatar-container { position: relative; width: 110px; height: 110px; margin-bottom: 24px; }
        .my-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #fff; position: relative; z-index: 5; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* Soft Elegant Ripple (Not Sci-Fi) */
        .soft-ripple { position: absolute; inset: -15px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); animation: rippleAnim 2.5s infinite ease-out; z-index: 1; opacity: 0; }
        .soft-ripple:nth-child(2) { animation-delay: 1.25s; }
        @keyframes rippleAnim { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }

        .search-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .search-subtitle { font-size: 0.95rem; font-weight: 500; color: var(--text-muted); text-align: center; height: 20px; animation: breatheText 2s infinite; }
        @keyframes breatheText { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Top Bar Indicators */
        .top-status { position: absolute; top: env(safe-area-inset-top, 20px); left: 0; right: 0; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; }
        .status-pill { background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
        .status-pill.premium { color: var(--premium); border-color: rgba(245, 197, 24, 0.4); background: rgba(245, 197, 24, 0.1); }

        /* Bottom Actions */
        .action-container { position: absolute; bottom: env(safe-area-inset-bottom, 30px); left: 0; right: 0; padding: 0 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        
        .radar-btn { width: 100%; max-width: 340px; background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 18px; border-radius: 20px; color: #fff; font-weight: 800; font-size: 1.05rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .radar-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.15); }
        
        .cancel-btn { color: var(--danger); font-weight: 700; font-size: 1rem; cursor: pointer; padding: 10px; background: none; border: none; transition: 0.2s; display: none; /* PRO Only */ }
        .cancel-btn:active { opacity: 0.6; }

        /* ===== 5-SECOND REALISTIC MATCH REVEAL UI ===== */
        #matchUI { position: fixed; inset: 0; z-index: 20; opacity: 0; visibility: hidden; transition: all 0.5s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #matchUI.show { opacity: 1; visibility: visible; }

        /* The Match Card */
        .match-card { width: 90%; max-width: 380px; background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 40px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.7); transform: scale(0.9) translateY(30px); opacity: 0; transition: all 0.8s var(--spring); }
        #matchUI.show .match-card { transform: scale(1) translateY(0); opacity: 1; }

        .match-photo-container { width: 100%; height: 320px; position: relative; }
        .match-photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .match-photo-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(28,28,30,1) 100%); }
        
        .match-compat { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; color: var(--success); border: 1px solid rgba(50,215,75,0.3); }

        .match-info-section { padding: 0 24px 30px; margin-top: -20px; position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .match-name-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
        .match-name { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
        
        /* Badges (Hidden by Default) */
        .verified-badge { width: 24px; height: 24px; fill: var(--accent); display: none; }
        .pro-icon-badge { background: var(--premium); color: #000; font-size: 0.65rem; font-weight: 900; padding: 3px 6px; border-radius: 6px; display: none; }
        
        .match-location { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

        .match-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .tag { background: var(--surface-light); border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; color: #fff; }
        
        .creator-tag { background: linear-gradient(135deg, #FF2E93, #FF8A00); border: none; display: none; }

        /* Slow 5.5 Second Progress Bar */
        .connection-status { width: 100%; }
        .status-text { font-size: 0.8rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #fff; border-radius: 6px; }
        #matchUI.show .progress-fill { animation: fillUp 5.5s linear forwards; }
        @keyframes fillUp { from { width: 0%; } to { width: 100%; } }

    </style>
</head>
<body>

    <!-- 1. LIVE CAMERA BACKGROUND -->
    <div class="live-bg">
        <video id="localVideoBg" autoplay playsinline muted></video>
        <div class="bg-overlay"></div>
    </div>

    <!-- 2. SEARCHING UI (Clean Apple Style) -->
    <div id="searchingUI">
        <div class="top-status">
            <div class="status-pill" id="modePill">🌍 Global Mode</div>
            <div class="status-pill premium" id="proPill" style="display: none;">👑 PRO Active</div>
        </div>

        <div class="search-card">
            <div class="avatar-container">
                <div class="soft-ripple"></div>
                <div class="soft-ripple"></div>
                <img src="../assets/favicon perple.png" id="myAvatar" alt="Me" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3114/3114868.png'">
            </div>
            <div class="search-title">Finding Match</div>
            <div class="search-subtitle" id="rotatingMsg">Scanning secure nodes...</div>
        </div>

        <div class="action-container">
            <button class="radar-btn" onclick="alert('Nearby Radar feature opening...')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                Open Nearby Radar (PRO)
            </button>
            <button class="cancel-btn" id="cancelBtn">Cancel Search</button>
        </div>
    </div>

    <!-- 3. REALISTIC 5-SECOND MATCH REVEAL CARD -->
    <div id="matchUI">
        <div class="match-card">
            <div class="match-photo-container">
                <img src="" id="matchPhoto" alt="Match">
                <div class="match-photo-overlay"></div>
                <div class="match-compat" id="matchCompat">98%</div>
            </div>

            <div class="match-info-section">
                <div class="match-name-row">
                    <span class="match-name" id="matchName">Loading...</span>
                    <!-- Verified Badge (Hidden by default) -->
                    <svg class="verified-badge" id="badgeVerified" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="pro-icon-badge" id="badgePro">PRO</span>
                </div>
                
                <div class="match-location" id="matchLocation">🌍 Connecting...</div>

                <div class="match-tags">
                    <div class="tag" id="tagGender">🧑 Unknown</div>
                    <div class="tag" id="tagLang">🗣️ English</div>
                    <!-- Creator Badge (Hidden by default) -->
                    <div class="tag creator-tag" id="badgeCreator">🎬 Creator</div>
                </div>

                <div class="connection-status">
                    <div class="status-text">
                        <span>Connecting Peer...</span>
                        <span id="timerText">5.5s</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. LOGIC & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue, get, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- BACKGROUND CAMERA ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1920 } }, audio: false });
                document.getElementById('localVideoBg').srcObject = stream;
            } catch (e) { console.log('Camera error:', e); }
        }
        startCamera();

        // --- URL PARAMS & UI SETUP ---
        const urlParams = new URLSearchParams(window.location.search);
        const matchMode = urlParams.get('mode') || 'random';
        
        if (matchMode !== 'random') {
            document.getElementById('modePill').textContent = `🎯 ${matchMode.toUpperCase()} Mode`;
            document.getElementById('modePill').style.color = "var(--premium)";
            document.getElementById('modePill').style.borderColor = "rgba(245, 197, 24, 0.4)";
        }

        // Rotating Subtitles
        const msgs = ["Scanning secure nodes...", "Bypassing firewalls...", "Analyzing profile compatibility...", "Looking for active users...", "Almost there..."];
        let msgIndex = 0;
        setInterval(() => {
            const el = document.getElementById('rotatingMsg');
            el.style.opacity = 0;
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % msgs.length;
                el.textContent = msgs[msgIndex];
                el.style.opacity = 1;
            }, 300);
        }, 2000);

        // --- GLOBAL STATE & BULLETPROOF LOCK ---
        let currentUser = null;
        let isUserPro = false;
        let searchInterval = null;
        let hasMatched = false; // LOCK FLAG TO PREVENT DOUBLE MATCHING
        let roomListenerUnsubscribe = null;

        // Cancel Button (PRO Only)
        document.getElementById('cancelBtn').addEventListener('click', async () => {
            if (currentUser && isUserPro && !hasMatched) {
                hasMatched = true; // Lock
                clearInterval(searchInterval);
                if(roomListenerUnsubscribe) roomListenerUnsubscribe();
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', roomId: null, matchMode: null });
                window.location.href = 'home.html';
            }
        });

        // --- FIREBASE INITIALIZATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                
                onDisconnect(userRef).update({ status: 'offline', roomId: null, matchMode: null });
                await update(userRef, { status: 'searching', roomId: null, matchMode: matchMode });

                // Fetch our Profile & PRO Status
                const snap = await get(userRef);
                const profile = snap.exists() ? snap.val() : {};
                isUserPro = profile.isPremium || false;

                if (isUserPro) {
                    document.getElementById('cancelBtn').style.display = 'block';
                    document.getElementById('proPill').style.display = 'flex';
                }
                if (profile.photoURL) document.getElementById('myAvatar').src = profile.photoURL;

                // 1. RECEIVER LOGIC (If someone creates a room for us)
                roomListenerUnsubscribe = onValue(ref(db, 'users/' + user.uid + '/roomId'), async (snapshot) => {
                    const roomId = snapshot.val();
                    if (roomId && !hasMatched) {
                        hasMatched = true; // STRICT LOCK
                        clearInterval(searchInterval);
                        if(roomListenerUnsubscribe) roomListenerUnsubscribe();
                        
                        await update(userRef, { status: 'in-call' });

                        const callerUid = await findCallerByRoomId(roomId);
                        showMatchCard(callerUid, roomId, false);
                    }
                });

                startSearch();
            } else {
                window.location.href = '../index.html';
            }
        });

        function startSearch() {
            searchInterval = setInterval(findMatch, 1500); // Check every 1.5s
        }

        // 2. CALLER LOGIC (We search for someone)
        async function findMatch() {
            if (hasMatched) return; // Abort if locked

            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return;
            const users = snapshot.val();

            let candidates = [];
            for (const uid in users) {
                if (uid === currentUser.uid) continue;
                const u = users[uid];
                if (u.status !== 'searching' || u.roomId) continue;
                candidates.push({ uid, score: Math.random() });
            }

            if (candidates.length === 0) return;
            candidates.sort((a, b) => b.score - a.score);
            const bestUid = candidates[0].uid;

            const candidateRoomRef = ref(db, 'users/' + bestUid + '/roomId');
            const generatedRoomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

            // Transaction ensures we exclusively lock this user
            runTransaction(candidateRoomRef, (currentRoomId) => {
                if (currentRoomId === null) return generatedRoomId;
                return; // Abort if they are already taken
            }).then(async (result) => {
                if (result.committed && !hasMatched) {
                    hasMatched = true; // STRICT LOCK
                    clearInterval(searchInterval);
                    if(roomListenerUnsubscribe) roomListenerUnsubscribe();

                    await update(ref(db, 'users/' + currentUser.uid), {
                        status: 'in-call',
                        roomId: generatedRoomId,
                        lastMatchedUser: bestUid
                    });

                    showMatchCard(bestUid, generatedRoomId, true);
                }
            }).catch(console.error);
        }

        async function findCallerByRoomId(roomId) {
            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return null;
            const users = snapshot.val();
            for (const uid in users) {
                if (uid !== currentUser.uid && users[uid].roomId === roomId) {
                    return uid;
                }
            }
            return null;
        }

        // --- 5.5 SECOND MATCH REVEAL LOGIC ---
        async function showMatchCard(targetUid, roomId, isCaller) {
            // 1. Hide Searching UI
            document.getElementById('searchingUI').style.opacity = 0;
            setTimeout(() => { document.getElementById('searchingUI').style.display = 'none'; }, 500);

            // 2. Fetch opponent real details
            let opp = {};
            if (targetUid) {
                const snap = await get(ref(db, 'users/' + targetUid));
                if (snap.exists()) opp = snap.val();
            }

            // Data Mapping (Realistic default fallbacks)
            const photo = opp.photoURL || `https://i.pravatar.cc/500?u=${targetUid || Math.random()}`;
            const name = opp.displayName || 'Guest User';
            const country = opp.country || '🌍 Unknown Region';
            const gender = opp.gender === 'male' ? '👨 Male' : (opp.gender === 'female' ? '👩 Female' : '🧑 Unknown');
            const lang = opp.language || '🗣️ English';
            
            // Realistic Badge Probability (Not everyone gets it)
            // If actual DB value exists use it, else 15% chance for verified, 10% for Creator
            const isVerified = opp.isVerified !== undefined ? opp.isVerified : (Math.random() > 0.85); 
            const isCreator = opp.isCreator !== undefined ? opp.isCreator : (Math.random() > 0.90);
            const isPremiumUser = opp.isPremium !== undefined ? opp.isPremium : (Math.random() > 0.8);

            // Populate Card
            document.getElementById('matchPhoto').src = photo;
            document.getElementById('matchName').textContent = name;
            document.getElementById('matchLocation').innerHTML = `📍 ${country}`;
            document.getElementById('tagGender').textContent = gender;
            document.getElementById('tagLang').textContent = lang;
            document.getElementById('matchCompat').textContent = Math.floor(Math.random() * 15 + 85) + '% Match';

            // Show Badges Conditionally
            if (isVerified) document.getElementById('badgeVerified').style.display = 'block';
            if (isPremiumUser) document.getElementById('badgePro').style.display = 'inline-block';
            if (isCreator) {
                document.getElementById('badgeCreator').style.display = 'inline-flex';
                document.getElementById('badgeCreator').textContent = opp.creatorName ? `🎬 ${opp.creatorName}` : '🎬 Content Creator';
            }

            // 3. Trigger Show Animation
            setTimeout(() => {
                document.getElementById('matchUI').classList.add('show');
                
                // 5.5 Second Countdown Timer Sync
                let timeLeft = 5.5;
                const timerEl = document.getElementById('timerText');
                const countdown = setInterval(() => {
                    timeLeft -= 0.1;
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        timerEl.textContent = "0.0s";
                    } else {
                        timerEl.textContent = timeLeft.toFixed(1) + "s";
                    }
                }, 100);

            }, 300);

            // 4. Redirect exactly after 5.5 Seconds
            setTimeout(() => {
                window.location.href = `video-call.html?room=${roomId}&caller=${isCaller}&mode=${matchMode}`;
            }, 5500);
        }

    </script>
</body>
</html>
