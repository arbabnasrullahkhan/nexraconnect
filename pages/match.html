<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Finding Match... - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ULTRA PREMIUM PRO iOS VARIABLES ===== */
        :root {
            --accent: #0A84FF;
            --accent-glow: rgba(10, 132, 255, 0.4);
            --bg-dark: #000000;
            --glass-bg: rgba(20, 20, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --premium: #F5C518;
            --success: #34C759;
            --danger: #FF3B30;
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Background Effects */
        .ambient-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .ambient-blob { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: drift 15s infinite alternate; }
        .ambient-blob.blue { background: var(--accent); top: -10%; left: -10%; }
        .ambient-blob.purple { background: #A855F7; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* ===== SEARCHING UI ===== */
        .search-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; transition: opacity 0.5s var(--spring), transform 0.5s var(--spring); }
        .search-container.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; display: none; }

        /* Top Safe Badges */
        .top-badges { position: absolute; top: max(20px, env(safe-area-inset-top)); width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 20; }
        .status-badge { background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .network-ping { color: var(--success); }
        .network-ping span { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
        .e2e-badge { color: var(--text-muted); }

        /* Mode Indicator */
        .mode-indicator { margin-bottom: 40px; padding: 8px 24px; border-radius: 30px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(20px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); animation: slideDown 0.6s var(--spring); }
        .mode-random { background: rgba(52, 199, 89, 0.15); color: var(--success); border: 1px solid rgba(52, 199, 89, 0.3); }
        .mode-interest { background: rgba(10, 132, 255, 0.15); color: var(--accent); border: 1px solid rgba(10, 132, 255, 0.3); }
        .mode-premium { background: rgba(245, 197, 24, 0.15); color: var(--premium); border: 1px solid rgba(245, 197, 24, 0.3); }

        /* Radar Animation */
        .radar-box { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
        .radar-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--accent); padding: 4px; z-index: 10; box-shadow: 0 0 30px var(--accent-glow); position: relative; }
        .radar-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .radar-ripple { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); z-index: 1; opacity: 0; animation: ripple 2.5s infinite cubic-bezier(0.2, 0.8, 0.4, 1); }
        .radar-ripple:nth-child(2) { animation-delay: 0.8s; }
        .radar-ripple:nth-child(3) { animation-delay: 1.6s; }
        
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; border-width: 3px; } 100% { transform: scale(3.5); opacity: 0; border-width: 0px; } }

        /* Typography & Status */
        .searching-title { font-size: 2rem; font-weight: 900; margin-bottom: 12px; text-align: center; letter-spacing: -0.5px; }
        .searching-msg { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; height: 20px; transition: opacity 0.3s; }
        .wait-time { margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .wait-time svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }

        /* Cancel Button (Premium Only) */
        .cancel-wrapper { margin-top: 50px; height: 60px; display: flex; justify-content: center; width: 100%; }
        .cancel-btn { padding: 16px 40px; border-radius: 30px; background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: var(--danger); font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s var(--spring); display: none; /* Hidden for Free users */ }
        .cancel-btn:active { transform: scale(0.95); }
        .cancel-btn:hover { background: rgba(255, 59, 48, 0.2); }

        /* ===== MATCH PREVIEW SCREEN ===== */
        .preview-container { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); opacity: 0; visibility: hidden; transform: scale(1.05); transition: all 0.5s var(--spring); padding: 20px; }
        .preview-container.show { opacity: 1; visibility: visible; transform: scale(1); }

        .preview-title { font-size: 1.8rem; font-weight: 900; color: var(--success); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; animation: popIn 0.6s var(--spring) forwards; opacity: 0; transform: translateY(-20px); }

        .match-card { width: 100%; max-width: 400px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px 24px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); animation: slideUpFade 0.6s 0.2s var(--spring) forwards; opacity: 0; transform: translateY(40px); position: relative; overflow: hidden; }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 120px; background: linear-gradient(180deg, rgba(10, 132, 255, 0.15) 0%, transparent 100%); pointer-events: none; }

        .match-avatar-wrapper { position: relative; margin-bottom: 20px; }
        .match-avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); padding: 4px; object-fit: cover; background: #1C1C1E; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .match-verify { position: absolute; bottom: 0; right: 0; background: var(--success); border: 2px solid var(--bg-dark); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .match-verify svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 3; fill: none; }

        .match-name { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .match-acc-type { font-size: 0.65rem; font-weight: 900; padding: 3px 8px; border-radius: 8px; text-transform: uppercase; }
        .acc-pro { background: rgba(245, 197, 24, 0.2); color: var(--premium); border: 1px solid rgba(245, 197, 24, 0.4); }
        .acc-free { background: rgba(255, 255, 255, 0.1); color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.2); }

        .match-details { display: flex; gap: 12px; margin-bottom: 24px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        .match-detail-item { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 12px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 20px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
        .stat-lbl { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        /* Auto Connect Progress */
        .connect-progress-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; animation: fadeIn 0.5s 0.8s forwards; opacity: 0; }
        .connect-text { font-size: 0.85rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; animation: pulseOp 1.5s infinite; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary-light)); width: 0%; border-radius: 6px; }

        @keyframes popIn { 0% { opacity: 0; transform: translateY(-20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes pulseOp { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <!-- Ambient Premium Background -->
    <div class="ambient-bg">
        <div class="ambient-blob blue"></div>
        <div class="ambient-blob purple"></div>
    </div>

    <!-- ===== 1. SEARCHING UI ===== -->
    <div class="search-container" id="searchContainer">
        
        <div class="top-badges">
            <div class="status-badge network-ping">
                <span></span> <div id="pingText">45ms</div>
            </div>
            <div class="status-badge e2e-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                E2E Encrypted
            </div>
        </div>

        <div class="mode-indicator" id="modeBadge">🎲 Random Search</div>

        <div class="radar-box">
            <div class="radar-ripple"></div>
            <div class="radar-ripple"></div>
            <div class="radar-ripple"></div>
            <div class="radar-avatar">
                <img src="../assets/favicon perple.png" id="myAvatar" alt="Me" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3114/3114868.png'">
            </div>
        </div>

        <div class="searching-title">Searching...</div>
        <div class="searching-msg" id="dynamicMsg">Connecting to global servers...</div>
        
        <div class="wait-time">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Estimated Wait: <span id="waitTime">0:00</span>
        </div>

        <!-- Premium users only see this -->
        <div class="cancel-wrapper">
            <button class="cancel-btn" id="cancelBtn">Cancel Search</button>
        </div>
    </div>

    <!-- ===== 2. MATCH PREVIEW SCREEN ===== -->
    <div class="preview-container" id="previewContainer">
        <div class="preview-title">Match Found!</div>
        
        <div class="match-card">
            <div class="match-avatar-wrapper">
                <img src="https://i.pravatar.cc/150?img=1" class="match-avatar" id="matchAvatar" alt="Match">
                <div class="match-verify" id="matchVerify"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
            </div>

            <div class="match-name">
                <span id="matchName">Loading...</span>
                <span class="match-acc-type acc-free" id="matchAccType">FREE</span>
            </div>

            <div class="match-details">
                <div class="match-detail-item" id="matchCountry">🌍 Global</div>
                <div class="match-detail-item" id="matchLang">🗣️ EN</div>
                <div class="match-detail-item" id="matchAge">21 Yrs</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val" id="matchComp">94%</div>
                    <div class="stat-lbl">Compatibility</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="matchRep" style="color: var(--success);">High</div>
                    <div class="stat-lbl">Reputation</div>
                </div>
            </div>

            <div class="connect-progress-wrap">
                <div class="connect-text">Establishing Secure Connection...</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue, get, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const matchMode = urlParams.get('mode') || 'random';

        // UI Elements
        const badge = document.getElementById('modeBadge');
        const dynamicMsg = document.getElementById('dynamicMsg');
        const waitTimeEl = document.getElementById('waitTime');
        const cancelBtn = document.getElementById('cancelBtn');
        const searchContainer = document.getElementById('searchContainer');
        const previewContainer = document.getElementById('previewContainer');
        const progressFill = document.getElementById('progressFill');

        // State Variables
        let currentUser = null;
        let isUserPro = false;
        let searchInterval = null;
        let msgInterval = null;
        let timerInterval = null;
        let isRedirecting = false;
        let waitSeconds = 0;
        
        let myInterests = [];
        let myGender = null;
        let myLocation = 'global';
        let myLang = 'any';

        // Haptic helper
        const vibrate = () => { if (navigator.vibrate) navigator.vibrate([15, 30, 15]); };

        // 1. INIT UI BASED ON MODE
        if (matchMode === 'random') {
            badge.className = 'mode-indicator mode-random';
            badge.textContent = '🎲 Random Search';
        } else if (matchMode === 'interest') {
            badge.className = 'mode-indicator mode-interest';
            badge.textContent = '🎯 Smart Interest Match';
        } else if (matchMode === 'premium' || matchMode.includes('squad')) {
            badge.className = 'mode-indicator mode-premium';
            badge.textContent = '👑 Premium Priority Search';
        }

        // 2. DYNAMIC STATUS MESSAGES
        const messages = [
            "Applying Smart Filters...", 
            "Optimizing Region Routing...", 
            "Checking Network Quality...", 
            "Scanning Global Network...",
            "Prioritizing Verified Users..."
        ];
        let msgIndex = 0;
        msgInterval = setInterval(() => {
            dynamicMsg.style.opacity = 0;
            setTimeout(() => {
                dynamicMsg.textContent = messages[msgIndex];
                dynamicMsg.style.opacity = 1;
                msgIndex = (msgIndex + 1) % messages.length;
            }, 300);
        }, 2500);

        // 3. WAIT TIMER
        timerInterval = setInterval(() => {
            waitSeconds++;
            const m = Math.floor(waitSeconds / 60);
            const s = waitSeconds % 60;
            waitTimeEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            
            // Mock Ping variation
            document.getElementById('pingText').textContent = `${Math.floor(Math.random() * 20 + 30)}ms`;
        }, 1000);

        // 4. CANCEL LOGIC (Premium Only rule implemented)
        cancelBtn.addEventListener('click', async () => {
            if(!isUserPro) return; // Failsafe
            vibrate();
            if (currentUser) {
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', roomId: null, matchMode: null });
            }
            window.location.href = 'home.html';
        });

        // 5. FIREBASE AUTH & START SEARCH
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                
                // Cleanup if disconnected
                onDisconnect(userRef).update({ status: 'offline', roomId: null, matchMode: null });

                // Fetch My Profile Data
                const snap = await get(userRef);
                const profile = snap.exists() ? snap.val() : {};
                
                myInterests = profile.interests || [];
                myGender = profile.gender || null;
                myLocation = profile.matchLocationPref || 'global';
                myLang = profile.matchLangPref || 'any';
                isUserPro = profile.isPremium || false;

                // Restrict Cancel Button visibility based on subscription
                if (isUserPro) {
                    cancelBtn.style.display = 'block';
                } else {
                    cancelBtn.style.display = 'none'; // Free users cannot cancel
                }

                await update(userRef, { status: 'searching', roomId: null, matchMode: matchMode });

                // Listener for incoming match (If someone else matched with me)
                onValue(ref(db, 'users/' + user.uid + '/roomId'), async (snapshot) => {
                    const roomId = snapshot.val();
                    if (roomId && !isRedirecting) {
                        isRedirecting = true;
                        clearInterval(searchInterval);
                        clearInterval(msgInterval);
                        clearInterval(timerInterval);
                        
                        await update(userRef, { status: 'in-call' });
                        
                        // Look for the caller to show their preview
                        const callerUid = await findUserByRoomId(roomId, user.uid);
                        triggerMatchPreview(callerUid, roomId, false);
                    }
                });

                // Start Fast Search (1.5 seconds)
                searchInterval = setInterval(findMatch, 1500);
            } else {
                window.location.href = '../index.html';
            }
        });

        // Helper: Find caller UID
        async function findUserByRoomId(rId, myUid) {
            const snap = await get(ref(db, 'users'));
            if(!snap.exists()) return null;
            const users = snap.val();
            for(const uid in users) {
                if(uid !== myUid && users[uid].roomId === rId) return uid;
            }
            return null;
        }

        // 6. FIND MATCH ENGINE
        async function findMatch() {
            if (isRedirecting) return;

            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return;
            const users = snapshot.val();

            let candidates = [];

            for (const uid in users) {
                if (uid === currentUser.uid) continue;
                const u = users[uid];
                if (u.status !== 'searching' || u.roomId) continue;

                // Priority Scoring System
                let score = Math.random();
                if(u.isPremium) score += 2; // Premium users matched faster
                if(u.isVerified) score += 1;

                if (matchMode === 'random') {
                    candidates.push({ uid, score });
                } else if (matchMode === 'interest') {
                    let overlap = 0;
                    const theirInterests = u.interests || [];
                    if (myInterests.length > 0 && theirInterests.length > 0) {
                        overlap = myInterests.filter(i => theirInterests.includes(i)).length;
                    }
                    candidates.push({ uid, score: score + overlap });
                } else if (matchMode === 'premium') {
                    const theirGender = u.gender;
                    if (!theirGender || !myGender) continue;
                    
                    // Specific Gender Check (Example logic based on home.html selectedGenderPref)
                    const prefGender = u.matchGenderPref || 'both';
                    if(prefGender === 'male' && theirGender !== 'male') continue;
                    if(prefGender === 'female' && theirGender !== 'female') continue;
                    
                    candidates.push({ uid, score });
                }
            }

            if (candidates.length === 0) return;

            // Sort & Pick Best Candidate
            candidates.sort((a, b) => b.score - a.score);
            const bestUid = candidates[0].uid;

            const candidateRoomRef = ref(db, 'users/' + bestUid + '/roomId');
            const generatedRoomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            runTransaction(candidateRoomRef, (currentRoomId) => {
                if (currentRoomId === null) return generatedRoomId;
                return;
            }).then(async (result) => {
                if (result.committed) {
                    isRedirecting = true;
                    clearInterval(searchInterval);
                    clearInterval(msgInterval);
                    clearInterval(timerInterval);

                    await update(ref(db, 'users/' + currentUser.uid), {
                        status: 'in-call',
                        roomId: generatedRoomId,
                        lastMatchedUser: bestUid
                    });

                    // I am the Caller, show preview of Callee
                    triggerMatchPreview(bestUid, generatedRoomId, true);
                }
            }).catch(console.error);
        }

        // 7. PREMIUM MATCH PREVIEW FLOW
        async function triggerMatchPreview(matchedUid, roomId, isCaller) {
            vibrate(); // Haptic success

            // Hide Search, Show Preview
            searchContainer.classList.add('hidden');
            previewContainer.classList.add('show');

            // Fetch Matched User Details
            let mName = "Stranger", mAge = "20 Yrs", mCountry = "🌍 Global", mLang = "🗣️ EN", isPro = false, isVerified = false, mPhoto = "https://i.pravatar.cc/150?img=1";
            let compScore = Math.floor(Math.random() * 20 + 80); // 80-99%

            if (matchedUid) {
                const mSnap = await get(ref(db, 'users/' + matchedUid));
                if (mSnap.exists()) {
                    const mData = mSnap.val();
                    mName = mData.displayName || "User";
                    if (mData.photoURL) mPhoto = mData.photoURL;
                    isPro = mData.isPremium || false;
                    isVerified = mData.isVerified || false;
                    // Mocking extended data that might not be in basic profile
                    if(mData.country) mCountry = mData.country;
                    if(mData.age) mAge = mData.age + " Yrs";
                }
            }

            // Populate DOM
            document.getElementById('matchName').textContent = mName;
            document.getElementById('matchAvatar').src = mPhoto;
            document.getElementById('matchCountry').textContent = mCountry;
            document.getElementById('matchAge').textContent = mAge;
            document.getElementById('matchComp').textContent = compScore + "%";
            document.getElementById('matchVerify').style.display = isVerified ? 'flex' : 'none';
            
            const accType = document.getElementById('matchAccType');
            if(isPro) {
                accType.textContent = "PRO";
                accType.className = "match-acc-type acc-pro";
            } else {
                accType.textContent = "FREE";
                accType.className = "match-acc-type acc-free";
            }

            // Progress Bar Animation (3 Seconds)
            progressFill.style.transition = 'width 2.8s linear';
            setTimeout(() => { progressFill.style.width = '100%'; }, 100);

            // Redirect after 3 seconds
            setTimeout(() => {
                const callerParam = isCaller ? '&caller=true' : '';
                window.location.href = `video-call.html?room=${roomId}&mode=${matchMode}${callerParam}`;
            }, 3000);
        }
    </script>
