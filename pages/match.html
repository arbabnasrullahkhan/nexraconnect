<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>AI Matchmaking - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== ULTRA-PREMIUM CINEMATIC VARIABLES ===== */
        :root {
            --accent: #0A84FF;
            --accent-glow: rgba(10, 132, 255, 0.6);
            --premium: #F5C518;
            --bg-dark: #050505;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --success: #34C759;
            --danger: #FF3B30;
            --blur: blur(20px);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; width: 100%; }

        /* ===== LIVE BACKGROUND CAMERA ===== */
        .live-bg { position: fixed; inset: 0; z-index: 0; background: #000; overflow: hidden; }
        #localVideoBg { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1) scale(1.1); filter: blur(15px) brightness(0.3) contrast(1.2); }
        .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.9) 100%); }

        /* ===== HOLOGRAPHIC SCANNING UI ===== */
        #searchingUI { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        
        /* Scanner Animation */
        .scanner-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
        .scanner-circle { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(10, 132, 255, 0.3); box-shadow: inset 0 0 30px rgba(10, 132, 255, 0.1); overflow: hidden; }
        .scanner-circle::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent 270deg, var(--accent) 360deg); border-radius: 50%; animation: spin 2s linear infinite; }
        .scanner-circle::after { content: ''; position: absolute; inset: 3px; background: rgba(0,0,0,0.6); border-radius: 50%; backdrop-filter: blur(5px); }
        
        .profile-core { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow); z-index: 5; overflow: hidden; }
        .profile-core img { width: 100%; height: 100%; object-fit: cover; }

        .search-title { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .search-subtitle { font-size: 0.9rem; font-weight: 500; color: var(--accent); letter-spacing: 1px; animation: pulseText 1.5s infinite; height: 20px; }

        .cancel-btn { position: absolute; bottom: 50px; padding: 14px 32px; border-radius: 24px; border: 1px solid rgba(255, 59, 48, 0.4); background: rgba(255, 59, 48, 0.1); color: var(--danger); font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; display: none; /* Only PRO */ backdrop-filter: var(--blur); text-transform: uppercase; letter-spacing: 1px; }
        .cancel-btn:active { transform: scale(0.95); background: rgba(255, 59, 48, 0.2); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ===== CINEMATIC MATCH REVEAL UI ===== */
        #matchUI { position: fixed; inset: 0; z-index: 20; opacity: 0; visibility: hidden; transition: all 0.6s ease; display: flex; flex-direction: column; background: #000; }
        #matchUI.show { opacity: 1; visibility: visible; }

        .match-bg { position: absolute; inset: 0; z-index: 1; }
        .match-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transform: scale(1.05); transition: opacity 1s ease, transform 4s ease-out; }
        #matchUI.show .match-bg img { opacity: 0.85; transform: scale(1); }
        
        /* Cinematic Gradients */
        .match-overlay { position: absolute; inset: 0; z-index: 2; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 30%, transparent 50%, rgba(0,0,0,0.9) 100%); }

        /* Match Details Panel */
        .match-details { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; padding: 40px 24px 50px; display: flex; flex-direction: column; gap: 12px; transform: translateY(40px); opacity: 0; transition: all 0.8s 0.3s var(--spring); }
        #matchUI.show .match-details { transform: translateY(0); opacity: 1; }

        .match-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
        
        .name-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .match-name { font-size: 2.8rem; font-weight: 900; line-height: 1; letter-spacing: -1px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 10px; }
        .verified-icon { width: 26px; height: 26px; fill: var(--accent); filter: drop-shadow(0 0 5px var(--accent-glow)); }
        .match-country { font-size: 1.1rem; font-weight: 600; color: #E5E5EA; text-shadow: 0 2px 10px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 6px; }

        /* Compatibility Score Circle */
        .compat-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: var(--blur); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .compat-score { font-size: 1.6rem; font-weight: 900; color: var(--success); text-shadow: 0 0 10px rgba(52, 199, 89, 0.4); }
        .compat-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Chips */
        .chips-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .chip { background: rgba(255,255,255,0.15); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .chip.pro { background: rgba(245, 197, 24, 0.15); border-color: rgba(245, 197, 24, 0.4); color: var(--premium); }
        .chip.creator { background: linear-gradient(135deg, #FF2E93, #FF8A00); border: none; color: #fff; }

        /* Progress Bar */
        .connect-status { font-size: 0.8rem; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Top Bar Overlay */
        .top-bar { position: absolute; top: env(safe-area-inset-top, 20px); left: 0; right: 0; padding: 0 20px; z-index: 5; display: flex; justify-content: space-between; align-items: center; opacity: 0; transform: translateY(-20px); transition: all 0.6s 0.5s ease; }
        #matchUI.show .top-bar { opacity: 1; transform: translateY(0); }
        .match-badge { background: var(--success); color: #000; padding: 4px 12px; border-radius: 12px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4); }
        .secure-badge { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.7); }
        .secure-badge svg { width: 12px; fill: currentColor; }

    </style>
</head>
<body>

    <!-- 1. LIVE CAMERA BACKGROUND -->
    <div class="live-bg">
        <video id="localVideoBg" autoplay playsinline muted></video>
        <div class="bg-overlay"></div>
    </div>

    <!-- 2. HOLOGRAPHIC SCANNING UI -->
    <div id="searchingUI">
        <div class="scanner-container">
            <div class="scanner-circle"></div>
            <div class="profile-core">
                <img src="../assets/favicon perple.png" id="myAvatar" alt="Me" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3114/3114868.png'">
            </div>
        </div>

        <div class="search-title">AI Matchmaking</div>
        <div class="search-subtitle" id="rotatingMsg">Initializing Global Nodes...</div>

        <!-- Hidden by default, shown via JS if user is PRO -->
        <button class="cancel-btn" id="cancelBtn">Abort Search</button>
    </div>

    <!-- 3. CINEMATIC MATCH REVEAL UI -->
    <div id="matchUI">
        <div class="match-bg">
            <img src="" id="matchImage" alt="">
        </div>
        <div class="match-overlay"></div>

        <div class="top-bar">
            <div class="match-badge">Match Found</div>
            <div class="secure-badge">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Encrypted Connection
            </div>
        </div>

        <div class="match-details">
            <div class="match-header">
                <div class="name-wrapper">
                    <div class="match-name">
                        <span id="matchName">Loading...</span>
                        <svg class="verified-icon" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="match-country" id="matchCountry">🌍 Global Network</div>
                </div>
                
                <div class="compat-box">
                    <div class="compat-score" id="compatScore">98%</div>
                    <div class="compat-label">Compatibility</div>
                </div>
            </div>

            <div class="chips-container">
                <div class="chip" id="matchLang">🗣️ English</div>
                <div class="chip" id="matchGender">🧑 Unknown</div>
                <div class="chip" id="matchAccountType">Standard</div>
                <div class="chip creator" id="creatorChip" style="display:none;">🎬 Content Creator</div>
            </div>

            <div class="connect-status">Establishing Secure Tunnel...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- 4. LOGIC & FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue, get, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- START BACKGROUND CAMERA ---
        async function startBgCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                document.getElementById('localVideoBg').srcObject = stream;
            } catch (e) { console.log('Camera permission denied for background.'); }
        }
        startBgCamera();

        const urlParams = new URLSearchParams(window.location.search);
        const matchMode = urlParams.get('mode') || 'random';

        // Rotating Search Messages
        const msgs = ["Bypassing firewalls...", "Analyzing global network...", "Scanning 14,302 active nodes...", "Filtering high-quality profiles...", "Locking target..."];
        let msgIndex = 0;
        setInterval(() => {
            const el = document.getElementById('rotatingMsg');
            el.style.opacity = 0;
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % msgs.length;
                el.textContent = msgs[msgIndex];
                el.style.opacity = 1;
            }, 300);
        }, 2000);

        let currentUser = null;
        let isUserPro = false;
        let searchInterval = null;
        let isRedirecting = false; // ROCK SOLID PREVENTER FOR DOUBLE MATCH

        // Cancel Button (PRO Only)
        document.getElementById('cancelBtn').addEventListener('click', async () => {
            if (currentUser && isUserPro) {
                isRedirecting = true;
                clearInterval(searchInterval);
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', roomId: null, matchMode: null });
                window.location.href = 'home.html';
            }
        });

        // --- AUTH & FIREBASE INIT ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                
                onDisconnect(userRef).update({ status: 'offline', roomId: null, matchMode: null });
                await update(userRef, { status: 'searching', roomId: null, matchMode: matchMode });

                const snap = await get(userRef);
                const profile = snap.exists() ? snap.val() : {};
                isUserPro = profile.isPremium || false;

                if (isUserPro) document.getElementById('cancelBtn').style.display = 'block';
                if (profile.photoURL) document.getElementById('myAvatar').src = profile.photoURL;

                // 1. LISTENER FOR RECEIVER (If someone else calls us)
                onValue(ref(db, 'users/' + user.uid + '/roomId'), async (snapshot) => {
                    const roomId = snapshot.val();
                    // BUG FIX: Strictly check if not already redirecting
                    if (roomId && !isRedirecting) {
                        isRedirecting = true; // Lock execution
                        clearInterval(searchInterval); // Stop searching immediately
                        
                        await update(userRef, { status: 'in-call' });

                        const callerUid = await findCallerByRoomId(roomId);
                        showCinematicPreview(callerUid, roomId, false);
                    }
                });

                startSearch();
            } else {
                window.location.href = '../index.html';
            }
        });

        function startSearch() {
            // High-speed search interval (Every 1.2s for faster matching)
            searchInterval = setInterval(findMatch, 1200);
        }

        // 2. SEARCHER LOGIC (We are Caller)
        async function findMatch() {
            if (isRedirecting) return; // Prevent logic if already matched

            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return;
            const users = snapshot.val();

            let candidates = [];
            for (const uid in users) {
                if (uid === currentUser.uid) continue;
                const u = users[uid];
                
                if (u.status !== 'searching' || u.roomId) continue;
                candidates.push({ uid, score: Math.random() });
            }

            if (candidates.length === 0) return;

            candidates.sort((a, b) => b.score - a.score);
            const bestUid = candidates[0].uid;

            const candidateRoomRef = ref(db, 'users/' + bestUid + '/roomId');
            const generatedRoomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

            // Transaction ensures only ONE person grabs this user
            runTransaction(candidateRoomRef, (currentRoomId) => {
                if (currentRoomId === null) return generatedRoomId;
                return; // Abort
            }).then(async (result) => {
                if (result.committed) {
                    isRedirecting = true; // Lock execution
                    clearInterval(searchInterval); // Stop searching immediately

                    await update(ref(db, 'users/' + currentUser.uid), {
                        status: 'in-call',
                        roomId: generatedRoomId,
                        lastMatchedUser: bestUid
                    });

                    showCinematicPreview(bestUid, generatedRoomId, true);
                }
            }).catch(console.error);
        }

        async function findCallerByRoomId(roomId) {
            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return null;
            const users = snapshot.val();
            for (const uid in users) {
                if (uid !== currentUser.uid && users[uid].roomId === roomId) {
                    return uid;
                }
            }
            return null;
        }

        // --- CINEMATIC REVEAL ANIMATION (3 SECONDS) ---
        async function showCinematicPreview(targetUid, roomId, isCaller) {
            // 1. Hide Searching UI
            document.getElementById('searchingUI').style.opacity = 0;
            setTimeout(() => { document.getElementById('searchingUI').style.display = 'none'; }, 500);
            
            // 2. Fetch opponent details
            let opp = {};
            if (targetUid) {
                const snap = await get(ref(db, 'users/' + targetUid));
                if (snap.exists()) opp = snap.val();
            }

            // Fallbacks & Premium Details
            const photo = opp.photoURL || `https://i.pravatar.cc/600?u=${targetUid || Math.random()}`;
            const name = opp.displayName || 'Guest User';
            const country = opp.country || '🌍 Global Area';
            const gender = opp.gender === 'male' ? '👨 Male' : (opp.gender === 'female' ? '👩 Female' : '🧑 Unknown');
            const lang = opp.language || '🗣️ English';
            const isPro = opp.isPremium || (Math.random() > 0.6); // Simulated logic for UI showcase
            const isCreator = opp.creatorName || (Math.random() > 0.85); // Simulated Creator

            // 3. Inject Data
            document.getElementById('matchImage').src = photo;
            document.getElementById('matchName').innerHTML = `${name} <svg class="verified-icon" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            document.getElementById('matchCountry').innerHTML = country;
            document.getElementById('matchGender').innerHTML = gender;
            document.getElementById('matchLang').innerHTML = lang;
            document.getElementById('compatScore').textContent = Math.floor(Math.random() * 10 + 90) + '%'; // 90-99%

            const typeEl = document.getElementById('matchAccountType');
            if (isPro) {
                typeEl.innerHTML = '👑 PRO Member';
                typeEl.className = 'chip pro';
            } else {
                typeEl.innerHTML = 'Standard';
            }

            if (isCreator) {
                document.getElementById('creatorChip').style.display = 'flex';
            }

            // 4. Trigger Reveal
            setTimeout(() => {
                document.getElementById('matchUI').classList.add('show');
                // Animate progress bar
                setTimeout(() => { document.getElementById('progressFill').style.width = '100%'; }, 100);
            }, 300);

            // 5. Navigate to Video Call after 2.5 Seconds
            setTimeout(() => {
                window.location.href = `video-call.html?room=${roomId}&caller=${isCaller}&mode=${matchMode}`;
            }, 2500);
        }

    </script>
</body>
</html>
