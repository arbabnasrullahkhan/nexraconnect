<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#05000A">
    <title>Matchmaking - Nexra Connect Pro</title>
    <link rel="icon" type="image/png" href="../assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ROMANTIC & PREMIUM NEXT-LEVEL VARIABLES ===== */
        :root {
            --bg-dark: #05000A;         /* Deep Romantic Violet/Black */
            --surface: rgba(20, 10, 25, 0.6);
            --glass-border: rgba(255, 46, 147, 0.2);
            --text-main: #FFFFFF;
            --text-muted: #A098A6;
            --accent: #FF2E93;          /* Romantic Pink */
            --accent-glow: rgba(255, 46, 147, 0.5);
            --secondary: #7B2CBF;       /* Deep Purple */
            --premium: #FFD60A;         /* Premium Gold */
            --success: #32D74B;
            --danger: #FF453A;
            --blur: blur(40px);
            --spring: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; width: 100%; }

        /* ===== LIVE CAMERA & ROMANTIC BACKGROUND ===== */
        .ambient-bg { position: fixed; inset: 0; z-index: 0; background: var(--bg-dark); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Local camera (16K Quality & 0.7x Wide Zoom Fix) */
        #localVideoBg { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1) scale(1.05); filter: brightness(0.25) contrast(1.1) blur(18px); position: absolute; z-index: 1; transition: all 0.8s ease; }
        
        /* Floating Romantic Orbs & Particles */
        .search-network-bg { position: absolute; inset: 0; z-index: 2; opacity: 0.8; pointer-events: none; }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4; animation: drift 15s infinite alternate ease-in-out; }
        .orb-1 { width: 400px; height: 400px; background: rgba(255, 46, 147, 0.3); top: -10%; left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: rgba(123, 44, 191, 0.3); bottom: -10%; right: -10%; animation-delay: -5s; }
        
        .floating-profile { position: absolute; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid rgba(255,46,147,0.3); box-shadow: 0 10px 30px rgba(255,46,147,0.2); opacity: 0; animation: floatNetwork 8s infinite ease-in-out; }
        .fp-1 { width: 75px; height: 75px; top: 15%; left: 12%; background-image: url('https://i.pravatar.cc/150?img=5'); animation-delay: 0s; filter: blur(2px); }
        .fp-2 { width: 95px; height: 95px; top: 25%; right: 15%; background-image: url('https://i.pravatar.cc/150?img=11'); animation-delay: 2.5s; filter: blur(4px); }
        .fp-3 { width: 60px; height: 60px; bottom: 25%; left: 20%; background-image: url('https://i.pravatar.cc/150?img=44'); animation-delay: 5s; filter: blur(1px); }
        .fp-4 { width: 85px; height: 85px; bottom: 15%; right: 12%; background-image: url('https://i.pravatar.cc/150?img=60'); animation-delay: 7.5s; filter: blur(5px); }

        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.2); } }
        @keyframes floatNetwork { 0% { transform: translateY(60px) scale(0.8); opacity: 0; } 20% { opacity: 0.7; } 80% { opacity: 0.7; } 100% { transform: translateY(-60px) scale(1.1); opacity: 0; } }

        .bg-overlay { position: fixed; inset: 0; z-index: 3; background: linear-gradient(180deg, rgba(5,0,10,0.3) 0%, rgba(5,0,10,0.9) 100%); pointer-events: none; }

        /* ===== ROMANTIC SEARCHING UI ===== */
        #searchingUI { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; padding: 20px; }
        
        .search-card { position: relative; background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 45px 30px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1); width: 100%; max-width: 360px; overflow: hidden; }
        
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin-bottom: 24px; z-index: 5; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #fff; position: relative; z-index: 5; box-shadow: 0 15px 40px rgba(255, 46, 147, 0.4); }
        
        /* Romantic Heartbeat Pulse */
        .heartbeat-pulse { position: absolute; inset: -20px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); animation: heartbeat 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); z-index: 1; opacity: 0; }
        .heartbeat-pulse:nth-child(2) { animation-delay: 1s; background: radial-gradient(circle, rgba(123, 44, 191, 0.5) 0%, transparent 70%); }
        @keyframes heartbeat { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.4); opacity: 0; } }

        .search-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px; text-align: center; z-index: 5; background: linear-gradient(135deg, #fff, #FFD60A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-subtitle { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); text-align: center; height: 20px; animation: breatheText 2.5s infinite; z-index: 5; }
        @keyframes breatheText { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Dynamic Top Status Notch */
        .top-status { position: absolute; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); padding: 6px; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .status-pill { padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pill svg { width: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .status-pill.premium { color: #000; background: linear-gradient(135deg, var(--premium), #FF8A00); }

        /* Bottom Actions */
        .action-container { position: absolute; bottom: env(safe-area-inset-bottom, 40px); left: 0; right: 0; padding: 0 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        
        .radar-btn { width: 100%; max-width: 360px; background: rgba(255,255,255,0.08); backdrop-filter: var(--blur); border: 1px solid var(--glass-border); padding: 18px; border-radius: 24px; color: #fff; font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s var(--spring); box-shadow: 0 15px 40px rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 1px; }
        .radar-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.12); }
        .radar-btn svg { stroke: var(--premium); }
        
        .cancel-btn { color: var(--text-muted); font-weight: 700; font-size: 1rem; cursor: pointer; padding: 10px; background: none; border: none; transition: 0.3s; display: none; /* PRO Only */ }
        .cancel-btn:hover { color: var(--danger); }
        .cancel-btn:active { opacity: 0.6; }

        /* ===== NEARBY RADAR MODAL (PREMIUM) ===== */
        .radar-modal { position: fixed; inset: 0; background: rgba(5,0,10,0.9); backdrop-filter: blur(30px); z-index: 50; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.5s var(--spring); }
        .radar-modal.show { opacity: 1; visibility: visible; }
        
        .radar-header { padding: env(safe-area-inset-top, 24px) 24px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .radar-header h2 { font-size: 1.5rem; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 10px; }
        .close-radar { background: rgba(255,255,255,0.1); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .close-radar:active { transform: scale(0.9); }

        .radar-grid { padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; overflow-y: auto; max-height: calc(100vh - 100px); }
        .radar-user-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 28px; padding: 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .radar-user-card:active { transform: scale(0.95); border-color: var(--accent); }
        .radar-user-card img { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 2px solid #fff; box-shadow: 0 5px 20px rgba(255,46,147,0.3); }
        .radar-user-card h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 4px; color: #fff; text-align: center; }

        /* ===== 5.5-SECOND CINEMATIC MATCH REVEAL CARD ===== */
        #matchUI { position: fixed; inset: 0; z-index: 100; opacity: 0; visibility: hidden; transition: all 0.6s ease; display: flex; flex-direction: column; justify-content: flex-end; background: #000; }
        #matchUI.show { opacity: 1; visibility: visible; }

        .cinematic-bg { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
        .cinematic-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transform: scale(1.15); filter: blur(10px); }
        /* Romantic Smooth Zoom Out */
        #matchUI.show .cinematic-bg img { animation: cinematicZoom 5.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes cinematicZoom { 
            0% { opacity: 0; transform: scale(1.2); filter: blur(15px); } 
            15% { opacity: 0.9; transform: scale(1.05); filter: blur(0px); } 
            100% { opacity: 0.9; transform: scale(1); filter: blur(0px); } 
        }

        .cinematic-overlay { position: absolute; inset: 0; z-index: 2; background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 35%, transparent 45%, rgba(0,0,0,0.95) 100%); }

        /* Staggered Content Animation */
        .match-details { position: relative; z-index: 5; padding: 40px 24px env(safe-area-inset-bottom, 40px); display: flex; flex-direction: column; width: 100%; }
        
        .anim-item { opacity: 0; transform: translateY(30px); }
        #matchUI.show .anim-item { animation: slideUpFade 0.8s var(--spring) forwards; }
        #matchUI.show .anim-item:nth-child(1) { animation-delay: 0.3s; }
        #matchUI.show .anim-item:nth-child(2) { animation-delay: 0.5s; }
        #matchUI.show .anim-item:nth-child(3) { animation-delay: 0.7s; }
        #matchUI.show .anim-item:nth-child(4) { animation-delay: 0.9s; }
        
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .match-header-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; width: 100%; }
        
        .name-wrapper { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .match-name-container { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .match-name { font-size: clamp(2.5rem, 9vw, 3.8rem); font-weight: 900; line-height: 1; letter-spacing: -1.5px; text-shadow: 0 4px 25px rgba(0,0,0,0.9); color: #fff; }
        
        .verified-icon { width: clamp(28px, 7vw, 36px); height: clamp(28px, 7vw, 36px); fill: var(--accent); filter: drop-shadow(0 0 15px rgba(255,46,147,0.6)); display: none; }
        .pro-icon-badge { background: var(--premium); color: #000; font-size: 0.75rem; font-weight: 900; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; display: none; box-shadow: 0 4px 15px rgba(245, 197, 24, 0.5); }
        
        .creator-tag { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #000000, #25F4EE, #FE2C55); padding: 8px 16px; border-radius: 16px; font-size: 0.9rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.2); display: none; width: fit-content; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .creator-tag svg { width: 18px; fill: currentColor; }

        .compat-badge { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255,46,147,0.4); padding: 12px 20px; border-radius: 28px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .compat-score { font-size: 1.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px rgba(255,46,147,0.5); }
        .compat-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .chips-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .info-chip { background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 24px; font-size: 0.95rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.4); }

        .connect-status { font-size: 0.85rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; position: relative; }
        
        /* Exact 5.5 Second Shared Timer Bar */
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: #fff; box-shadow: 0 0 20px #fff, 0 0 10px var(--accent) inset; }
        #matchUI.show .progress-fill { animation: fillProgress 5.5s linear forwards; }
        @keyframes fillProgress { from { width: 0%; } to { width: 100%; } }

    </style>
</head>
<body>

    <!-- 1. LIVE CAMERA & ROMANTIC FLOATING BACKGROUND -->
    <div class="ambient-bg">
        <video id="localVideoBg" autoplay playsinline muted></video>
        
        <!-- Romantic Floating Orbs & Profiles -->
        <div class="search-network-bg">
            <div class="glow-orb orb-1"></div>
            <div class="glow-orb orb-2"></div>
            <div class="floating-profile fp-1"></div>
            <div class="floating-profile fp-2"></div>
            <div class="floating-profile fp-3"></div>
            <div class="floating-profile fp-4"></div>
        </div>

        <div class="bg-overlay"></div>
    </div>

    <!-- 2. SEARCHING UI (Romantic Glassmorphism) -->
    <div id="searchingUI">
        <div class="top-status">
            <div class="status-pill" id="modePill">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span id="modeText">Global Network</span>
            </div>
            <div class="status-pill premium" id="proPill" style="display: none;">👑 PRO Active</div>
        </div>

        <div class="search-card">
            <div class="avatar-wrapper">
                <div class="heartbeat-pulse"></div>
                <div class="heartbeat-pulse"></div>
                <img src="../assets/favicon perple.png" class="avatar-img" id="myAvatar" alt="Me" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3114/3114868.png'">
            </div>
            <div class="search-title" id="searchTitle">Finding Match</div>
            <div class="search-subtitle" id="rotatingMsg">Establishing secure connection...</div>
        </div>

        <div class="action-container">
            <button class="radar-btn" onclick="openRadar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                Nearby Radar (PRO)
            </button>
            <button class="cancel-btn" id="cancelBtn">Abort Search</button>
        </div>
    </div>

    <!-- 3. PREMIUM NEARBY RADAR MODAL -->
    <div class="radar-modal" id="radarModal">
        <div class="radar-header">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="currentColor"/></svg>
                Live Radar
            </h2>
            <button class="close-radar" onclick="closeRadar()">✕</button>
        </div>
        <div class="radar-grid" id="radarGrid">
            <!-- Simulated Radar Users -->
            <div class="radar-user-card" onclick="simulateRadarMatch('Sophia', 'https://i.pravatar.cc/300?img=5', '🇺🇸 USA', 'female')">
                <img src="https://i.pravatar.cc/300?img=5" alt="User">
                <h3>Sophia, 22</h3>
            </div>
            <div class="radar-user-card" onclick="simulateRadarMatch('Michael', 'https://i.pravatar.cc/300?img=11', '🇬🇧 UK', 'male')">
                <img src="https://i.pravatar.cc/300?img=11" alt="User">
                <h3>Michael, 26</h3>
            </div>
            <div class="radar-user-card" onclick="simulateRadarMatch('Isabella', 'https://i.pravatar.cc/300?img=44', '🇪🇸 Spain', 'female')">
                <img src="https://i.pravatar.cc/300?img=44" alt="User">
                <h3>Isabella, 21</h3>
            </div>
            <div class="radar-user-card" onclick="simulateRadarMatch('James', 'https://i.pravatar.cc/300?img=60', '🇨🇦 Canada', 'male')">
                <img src="https://i.pravatar.cc/300?img=60" alt="User">
                <h3>James, 24</h3>
            </div>
        </div>
    </div>

    <!-- 4. 5.5-SECOND CINEMATIC MATCH REVEAL CARD (Perfect 2-Way Sync) -->
    <div id="matchUI">
        <div class="cinematic-bg">
            <img src="" id="matchImageBg" alt="">
        </div>
        <div class="cinematic-overlay"></div>

        <div class="match-details">
            <div class="match-header-row anim-item">
                <div class="name-wrapper">
                    <div class="match-name-container">
                        <span class="match-name" id="matchName">Loading...</span>
                        <svg class="verified-icon" id="badgeVerified" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span class="pro-icon-badge" id="badgePro">PRO</span>
                    </div>
                    
                    <div class="creator-tag" id="badgeCreator">
                        <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
                        <span id="creatorName">Content Creator</span>
                    </div>
                </div>

                <div class="compat-badge">
                    <div class="compat-score" id="compatScore">98%</div>
                    <div class="compat-label" id="compatText">Match</div>
                </div>
            </div>

            <div class="chips-container anim-item">
                <div class="info-chip" id="matchCountry">🌍 Connecting...</div>
                <div class="info-chip" id="matchGender">🧑 Unknown</div>
                <div class="info-chip" id="matchLang">🗣️ Auto</div>
            </div>

            <div class="connect-status anim-item">
                <span id="connectMessage">Establishing Secure Connection</span>
                <span id="countdownText">5.5s</span>
            </div>
            <div class="progress-bar anim-item">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- 5. 100% PERFECTLY SYNCHRONIZED LOGIC (No 'User C' Bug) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue, get, runTransaction, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- HIGH RES CAMERA (0.7x Feel) ---
        async function startBgCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 3840 }, height: { ideal: 2160 } }, audio: false });
                document.getElementById('localVideoBg').srcObject = stream;
            } catch (e) {
                console.log('Camera fallback:', e);
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                    document.getElementById('localVideoBg').srcObject = fallback;
                } catch(err) {}
            }
        }
        startBgCamera();

        // --- PARAMS & SQUAD ADAPTATION ---
        const urlParams = new URLSearchParams(window.location.search);
        const matchMode = urlParams.get('mode') || 'random';
        const isSquad = matchMode.startsWith('squad');

        if (isSquad) {
            document.getElementById('modeText').textContent = `🛡️ ${matchMode.replace('_', ' ').toUpperCase()}`;
            document.getElementById('searchTitle').textContent = "Assembling Squad";
            document.getElementById('rotatingMsg').textContent = "Looking for available squad members...";
        } else if (matchMode !== 'random') {
            document.getElementById('modeText').textContent = `🎯 Filtered Match`;
            document.getElementById('modePill').style.color = "var(--premium)";
        }

        // Rotating Subtitles
        const msgs = ["Bypassing firewalls...", "Scanning active nodes...", "Filtering verified profiles...", "Analyzing compatibility...", "Securing connection..."];
        let msgIndex = 0;
        setInterval(() => {
            const el = document.getElementById('rotatingMsg');
            el.style.opacity = 0;
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % msgs.length;
                el.textContent = isSquad ? "Assembling Squad Members..." : msgs[msgIndex];
                el.style.opacity = 1;
            }, 300);
        }, 2500);

        // --- GLOBAL VARIABLES & 100% BULLETPROOF SYNC LOCK ---
        let currentUser = null;
        let isUserPro = false;
        let searchInterval = null;
        let hasMatched = false; // The absolute lock flag
        let myProfileListenerUnsubscribe = null;

        // Radar Modal Logic
        window.openRadar = () => {
            if (!isUserPro) { window.location.href = 'subscription.html'; return; }
            document.getElementById('radarModal').classList.add('show');
        };
        window.closeRadar = () => document.getElementById('radarModal').classList.remove('show');

        // Cancel Search Logic (PRO Only)
        document.getElementById('cancelBtn').addEventListener('click', async () => {
            if (currentUser && isUserPro && !hasMatched) {
                hasMatched = true; // Lock immediately
                clearInterval(searchInterval);
                if(myProfileListenerUnsubscribe) myProfileListenerUnsubscribe(); 
                
                await update(ref(db, 'users/' + currentUser.uid), { status: 'online', matchedWith: null, matchMode: null });
                window.location.href = 'home.html';
            }
        });

        // --- FIREBASE INIT & 2-WAY SYNCHRONIZED MATCHMAKING LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                
                // Clear state
                onDisconnect(userRef).update({ status: 'offline', matchedWith: null, matchMode: null });
                await update(userRef, { status: 'searching', matchedWith: null, matchMode: matchMode });

                // Fetch Profile
                const snap = await get(userRef);
                const profile = snap.exists() ? snap.val() : {};
                isUserPro = profile.isPremium || false;

                if (isUserPro) {
                    document.getElementById('cancelBtn').style.display = 'block';
                    document.getElementById('proPill').style.display = 'flex';
                }
                if (profile.photoURL) document.getElementById('myAvatar').src = profile.photoURL;

                // 1. THE PERFECT TWO-WAY LISTENER (Listens to OUR OWN matchedWith property)
                myProfileListenerUnsubscribe = onValue(ref(db, 'users/' + user.uid + '/matchedWith'), async (snapshot) => {
                    const matchData = snapshot.val();
                    
                    if (matchData && !hasMatched) {
                        hasMatched = true; // INSTANT GLOBAL LOCK
                        clearInterval(searchInterval);
                        if(myProfileListenerUnsubscribe) myProfileListenerUnsubscribe();
                        
                        // We are officially paired. Lock our status.
                        await update(userRef, { status: 'matched' });
                        
                        // Show Cinematic Reveal
                        triggerCinematicReveal(matchData.targetUid, matchData.roomId, matchData.isCaller);
                    }
                });

                startSearch();
            } else {
                window.location.href = '../index.html';
            }
        });

        function startSearch() {
            searchInterval = setInterval(findMatch, 1500); // 1.5s Loop
        }

        // 2. CALLER LOGIC (We search for available users)
        async function findMatch() {
            if (hasMatched) return; // Abort if locked locally

            const snapshot = await get(ref(db, 'users'));
            if (!snapshot.exists()) return;
            const users = snapshot.val();

            let candidates = [];
            for (const uid in users) {
                if (uid === currentUser.uid) continue;
                const u = users[uid];
                
                // Must be searching and not already matched with anyone
                if (u.status !== 'searching' || u.matchedWith) continue;
                
                candidates.push({ uid, score: Math.random() });
            }

            if (candidates.length === 0) return;
            candidates.sort((a, b) => b.score - a.score);
            const bestUid = candidates[0].uid; // The Receiver

            const newRoomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const receiverLockRef = ref(db, 'users/' + bestUid + '/matchedWith');

            // TRANSACTION: Try to write to the receiver's matchedWith node. 
            // This ensures NO ONE ELSE can grab this user at the same time.
            runTransaction(receiverLockRef, (currentData) => {
                if (currentData === null) {
                    // Receiver is free! Assign them to us.
                    return { targetUid: currentUser.uid, roomId: newRoomId, isCaller: false };
                }
                return; // Abort if they are taken by someone else
            }).then(async (result) => {
                if (result.committed && !hasMatched) {
                    hasMatched = true; // INSTANT LOCAL LOCK
                    clearInterval(searchInterval);
                    if(myProfileListenerUnsubscribe) myProfileListenerUnsubscribe();

                    // Update OUR own profile so our listener doesn't trip, and we are officially locked.
                    await update(ref(db, 'users/' + currentUser.uid), {
                        status: 'matched',
                        matchedWith: { targetUid: bestUid, roomId: newRoomId, isCaller: true }
                    });

                    // Proceed to preview locally
                    triggerCinematicReveal(bestUid, newRoomId, true);
                }
            }).catch(console.error);
        }

        // Radar Manual Match (PRO Logic)
        window.simulateRadarMatch = async (name, photo, country, gender) => {
            if (hasMatched) return;
            hasMatched = true; // Lock
            closeRadar();
            clearInterval(searchInterval);
            if(myProfileListenerUnsubscribe) myProfileListenerUnsubscribe();

            const fakeRoomId = 'radar_' + Date.now();
            await update(ref(db, 'users/' + currentUser.uid), { status: 'matched', matchedWith: { targetUid: 'fake', roomId: fakeRoomId } });
            
            injectMatchData(name, photo, country, gender, true, "TikTok: @" + name.toLowerCase(), true);
            start5SecondCountdown(fakeRoomId, true);
        };

        // --- 5.5 SECOND CINEMATIC REVEAL ANIMATION ---
        async function triggerCinematicReveal(targetUid, roomId, isCaller) {
            let opp = {};
            if (targetUid && targetUid !== 'fake') {
                const snap = await get(ref(db, 'users/' + targetUid));
                if (snap.exists()) opp = snap.val();
            }

            // Fallbacks & Realism logic
            const photo = opp.photoURL || `https://i.pravatar.cc/600?u=${targetUid || Math.random()}`;
            const name = opp.displayName || (isSquad ? 'Squad Member' : 'Guest User');
            const country = opp.country || '🌍 Global';
            const gender = opp.gender || 'unknown';
            
            const isVerified = opp.isVerified !== undefined ? opp.isVerified : (Math.random() > 0.80);
            const isPremiumUser = opp.isPremium !== undefined ? opp.isPremium : (Math.random() > 0.70);
            const creatorName = opp.creatorName || (Math.random() > 0.85 ? "TikTok: @creator" + Math.floor(Math.random()*99) : null);

            injectMatchData(name, photo, country, gender, isPremiumUser, creatorName, isVerified);
            start5SecondCountdown(roomId, isCaller);
        }

        function injectMatchData(name, photo, country, gender, isPro, creatorName, isVerified) {
            // Hide Search UI
            document.getElementById('searchingUI').style.opacity = 0;
            setTimeout(() => { document.getElementById('searchingUI').style.display = 'none'; }, 500);

            // Populate Match Card
            document.getElementById('matchImageBg').src = photo;
            document.getElementById('matchName').textContent = name;
            
            // UI Adaptations for Squad
            if (isSquad) {
                document.getElementById('connectMessage').textContent = "Joining Squad Room...";
                document.getElementById('compatText').textContent = "Squad";
            }
            
            // Badges
            if (isVerified) document.getElementById('badgeVerified').style.display = 'block';
            if (isPro) document.getElementById('badgePro').style.display = 'inline-block';
            if (creatorName) {
                document.getElementById('badgeCreator').style.display = 'inline-flex';
                document.getElementById('creatorName').textContent = creatorName.replace("TikTok: @", "");
            }

            document.getElementById('matchCountry').innerHTML = `📍 ${country}`;
            document.getElementById('matchGender').innerHTML = gender === 'male' ? '👨 Male' : (gender === 'female' ? '👩 Female' : '🧑 Human');
            document.getElementById('compatScore').textContent = Math.floor(Math.random() * 10 + 90) + '%';
        }

        function start5SecondCountdown(roomId, isCaller) {
            // Show Cinematic UI
            document.getElementById('matchUI').classList.add('show');
            
            // 5.5 Second Exactly Synced Local Countdown
            let timeLeft = 5.5;
            const textEl = document.getElementById('countdownText');
            const timer = setInterval(() => {
                timeLeft -= 0.1;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    textEl.textContent = "0.0s";
                } else {
                    textEl.textContent = timeLeft.toFixed(1) + "s";
                }
            }, 100);

            // Redirect to Call exactly at 5.5 Seconds for BOTH users
            setTimeout(() => {
                window.location.href = `video-call.html?room=${roomId}&caller=${isCaller}&mode=${matchMode}`;
            }, 5500);
        }

    </script>
</body>
</html>
