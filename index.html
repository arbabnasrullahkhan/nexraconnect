<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexra Connect - Random Video Chat</title>
    <link rel="icon" type="image/png" href="assets/favicon perple.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#FF2E93;--primary-light:#FF8A00;--secondary:#7B2CBF;--bg:#0A0A0F;--surface:#15151E;--surface-light:#1E1E2E;--text:#F9FAFB;--text-muted:#9CA3AF;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.08);--green:#22C55E;--red:#EF4444;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}

        /* ===== SPLASH ===== */
        .splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s,visibility 0.8s;}
        .splash.hidden{opacity:0;visibility:hidden;}
        .splash img{width:100px;height:100px;animation:popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;}
        .splash-title{margin-top:16px;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fadeUp 0.6s 0.3s forwards;}
        .splash-bar{width:120px;height:4px;background:var(--surface-light);border-radius:4px;margin-top:24px;overflow:hidden;}
        .splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:4px;animation:loadBar 1.8s 0.5s ease-out forwards;}
        @keyframes popIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
        @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
        @keyframes loadBar{to{width:100%;}}

        /* ===== BG BLOBS ===== */
        .blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.4;z-index:0;animation:blobDrift 20s infinite alternate;}
        .blob-1{width:400px;height:400px;background:rgba(255,46,147,0.25);top:-100px;right:-100px;}
        .blob-2{width:500px;height:500px;background:rgba(123,44,191,0.2);bottom:-150px;left:-150px;animation-delay:-7s;}
        .blob-3{width:250px;height:250px;background:rgba(255,138,0,0.15);top:50%;left:20%;animation-delay:-14s;}
        @keyframes blobDrift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,-30px) scale(1.1);}}

        /* ===== AUTH CONTAINER ===== */
        .auth-wrap{position:relative;z-index:10;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transform:translateY(20px);transition:all 0.8s cubic-bezier(0.34,1.56,0.64,1);}
        .auth-wrap.show{opacity:1;transform:translateY(0);}
        .auth-card{width:100%;max-width:400px;background:var(--surface);border-radius:28px;border:1px solid var(--glass-border);padding:32px 24px;box-shadow:0 25px 60px rgba(0,0,0,0.5);overflow:hidden;position:relative;}

        .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
        .auth-logo img{width:44px;height:44px;}
        .auth-logo span{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .auth-subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:24px;}

        /* Tabs */
        .auth-tabs{display:flex;background:var(--surface-light);border-radius:14px;margin-bottom:24px;padding:4px;}
        .auth-tab{flex:1;padding:10px;text-align:center;border-radius:12px;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.3s;color:var(--text-muted);}
        .auth-tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 4px 12px rgba(255,46,147,0.3);}

        /* Forms */
        .auth-form{display:none;}
        .auth-form.active{display:block;animation:fadeIn 0.4s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

        .input-group{margin-bottom:14px;}
        .input-group label{display:block;font-size:0.8rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
        .input-field{width:100%;padding:14px 16px;border-radius:14px;border:2px solid var(--glass-border);background:rgba(255,255,255,0.04);color:var(--text);font-size:1rem;font-weight:500;outline:none;transition:all 0.3s;}
        .input-field:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(255,46,147,0.1);}
        .input-field::placeholder{color:rgba(255,255,255,0.25);}

        .btn-primary{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 8px 20px rgba(255,46,147,0.3);margin-top:6px;position:relative;overflow:hidden;}
        .btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(255,46,147,0.4);}
        .btn-primary:active{transform:scale(0.97);}

        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:0.8rem;font-weight:600;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border);}

        .btn-social{width:100%;padding:14px;border-radius:14px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-weight:700;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.3s;margin-bottom:10px;}
        .btn-social:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}
        .btn-social img{width:22px;height:22px;}
        .btn-social svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

        .error-msg{color:var(--red);font-size:0.85rem;font-weight:600;margin-top:8px;display:none;text-align:center;animation:shake 0.4s;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

        /* Loading */
        .auth-loading{position:absolute;inset:0;background:rgba(21,21,30,0.85);backdrop-filter:blur(8px);border-radius:28px;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        .auth-loading.active{opacity:1;pointer-events:all;}
        .spinner{width:44px;height:44px;border:4px solid rgba(255,46,147,0.2);border-top:4px solid var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{100%{transform:rotate(360deg);}}

        /* Responsive */
        @media(max-width:380px){.auth-card{padding:24px 18px;border-radius:22px;} .auth-logo span{font-size:1.3rem;}}
        @media(min-height:800px){.auth-wrap{align-items:center;}}
    </style>
</head>
<body>

    <!-- SPLASH -->
    <div class="splash" id="splash">
        <img src="assets/favicon perple.png" alt="Nexra" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3114/3114868.png'">
        <div class="splash-title">Nexra Connect</div>
        <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>

    <!-- BG -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- AUTH -->
    <div class="auth-wrap" id="authWrap">
        <div class="auth-card">
            <div class="auth-loading" id="authLoading"><div class="spinner"></div></div>

            <div class="auth-logo">
                <img src="assets/favicon perple.png" alt="" onerror="this.style.display='none'">
                <span>Nexra Connect</span>
            </div>
            <div class="auth-subtitle">Meet new people through random video chat</div>

            <!-- TABS -->
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
            </div>

            <!-- LOGIN FORM -->
            <div class="auth-form active" id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" class="input-field" id="loginEmail" placeholder="you@email.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" class="input-field" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="error-msg" id="loginError"></div>
                <button class="btn-primary" id="loginBtn">Sign In</button>
            </div>

            <!-- REGISTER FORM -->
            <div class="auth-form" id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" class="input-field" id="regName" placeholder="John Doe" autocomplete="name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" class="input-field" id="regEmail" placeholder="you@email.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" class="input-field" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password">
                </div>
                <div class="error-msg" id="regError"></div>
                <button class="btn-primary" id="registerBtn">Create Account</button>
            </div>

            <div class="divider">OR</div>

            <button class="btn-social" id="googleBtn">
                <img src="https://cdn-icons-png.flaticon.com/512/3002/3002219.png" alt="G">
                Continue with Google
            </button>
            <button class="btn-social" id="guestBtn">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Quick Guest Login
            </button>
        </div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArd7Q_Jb5cF-6TWf6pVAp_E84tVZrilC0",
            authDomain: "nexra-finder.firebaseapp.com",
            databaseURL: "https://nexra-finder-default-rtdb.firebaseio.com",
            projectId: "nexra-finder",
            storageBucket: "nexra-finder.firebasestorage.app",
            messagingSenderId: "863940241308",
            appId: "1:863940241308:web:a4e8101e7fd3a22c458a59",
            measurementId: "G-GN3WSWBBDW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const splash = document.getElementById('splash');
        const authWrap = document.getElementById('authWrap');
        const authLoading = document.getElementById('authLoading');

        // Splash
        window.addEventListener('load', () => {
            setTimeout(() => {
                splash.classList.add('hidden');
                setTimeout(() => authWrap.classList.add('show'), 300);
            }, 2200);
        });

        // Already logged in?
        onAuthStateChanged(auth, (user) => {
            if (user) {
                setTimeout(() => { window.location.href = 'pages/home.html'; }, 2300);
            }
        });

        // Tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
            });
        });

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        async function saveUser(user) {
            await update(ref(db, 'users/' + user.uid), {
                uid: user.uid,
                displayName: user.displayName || 'Guest User',
                email: user.email || null,
                isAnonymous: user.isAnonymous,
                lastSeen: serverTimestamp()
            });
        }

        // EMAIL LOGIN
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            if (!email || !pass) { showError('loginError', 'Please fill in all fields.'); return; }
            authLoading.classList.add('active');
            try {
                const r = await signInWithEmailAndPassword(auth, email, pass);
                await saveUser(r.user);
                window.location.href = 'pages/home.html';
            } catch (e) {
                authLoading.classList.remove('active');
                if (e.code === 'auth/user-not-found') showError('loginError', 'No account found. Register first!');
                else if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') showError('loginError', 'Wrong password. Try again.');
                else showError('loginError', 'Login failed. Check your credentials.');
            }
        });

        // EMAIL REGISTER
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            if (!name || !email || !pass) { showError('regError', 'Please fill in all fields.'); return; }
            if (pass.length < 6) { showError('regError', 'Password must be at least 6 characters.'); return; }
            authLoading.classList.add('active');
            try {
                const r = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(r.user, { displayName: name });
                await set(ref(db, 'users/' + r.user.uid), {
                    uid: r.user.uid,
                    displayName: name,
                    email: email,
                    isAnonymous: false,
                    coins: 10,
                    lastSeen: serverTimestamp()
                });
                window.location.href = 'pages/home.html';
            } catch (e) {
                authLoading.classList.remove('active');
                if (e.code === 'auth/email-already-in-use') showError('regError', 'Email already registered. Try login.');
                else showError('regError', 'Registration failed. Try again.');
            }
        });

        // GOOGLE
        document.getElementById('googleBtn').addEventListener('click', async () => {
            authLoading.classList.add('active');
            try {
                const r = await signInWithPopup(auth, new GoogleAuthProvider());
                await saveUser(r.user);
                window.location.href = 'pages/home.html';
            } catch (e) { authLoading.classList.remove('active'); showError('loginError', 'Google login failed.'); }
        });

        // GUEST
        document.getElementById('guestBtn').addEventListener('click', async () => {
            authLoading.classList.add('active');
            try {
                const r = await signInAnonymously(auth);
                await saveUser(r.user);
                window.location.href = 'pages/home.html';
            } catch (e) { authLoading.classList.remove('active'); showError('loginError', 'Guest login failed.'); }
        });

        // Enter key
        document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
        document.getElementById('regPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('registerBtn').click(); });
    </script>
</body>
</html>
